<style>
:root{--bg:#071525;--surface:#0e2140;--surface2:#132d57;--surface3:#1a3a6a;--accent:#00d4e8;--accent2:#0891b2;--accent3:#0ea5e9;--text:#e8f0fe;--muted:#7ea8c9;--dim:#4a7399;--green:#22d47a;--red:#f05a5a;--amber:#f59e0b;--border:rgba(0,212,232,0.12);--border2:rgba(0,212,232,0.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,140,180,0.15),transparent),url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 40L40 0H30L0 30V40zm40 0V30L10 0H0l40 40z' fill='%23ffffff' fill-opacity='0.015'/%3E%3C/svg%3E")}
.site-header{background:linear-gradient(180deg,rgba(0,140,180,0.12) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:28px 24px 22px;text-align:center}
.site-header .kicker{font-size:0.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}
.site-header h1{font-size:clamp(1.3rem,4vw,1.75rem);font-weight:800;color:var(--text);line-height:1.2;margin-bottom:6px}
.site-header h1 span{color:var(--accent)}
.site-header .subtitle{font-size:0.8rem;color:var(--muted);font-weight:400}
.progress-zone{max-width:860px;margin:20px auto 0;padding:0 20px}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:0.78rem;color:var(--muted)}
.progress-track{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}
.main{max-width:860px;margin:24px auto 0;padding:0 16px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 28px;position:relative;overflow:hidden}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:16px 16px 0 0}
.type-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);font-size:0.68rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:18px}
.type-pill .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.q-stem{font-size:1rem;font-weight:400;line-height:1.7;color:var(--text);margin-bottom:22px}
.q-stem strong{color:var(--accent);font-weight:600}
.q-stem em{color:var(--muted);font-style:italic}
.choices{display:flex;flex-direction:column;gap:9px}
.choice{display:flex;align-items:flex-start;gap:13px;background:var(--surface2);border:1.5px solid rgba(0,212,232,0.08);border-radius:10px;padding:13px 16px;cursor:pointer;transition:border-color 0.18s,background 0.18s}
.choice:hover:not(.locked){border-color:rgba(0,212,232,0.3);background:var(--surface3)}
.choice input[type="radio"],.choice input[type="checkbox"]{accent-color:var(--accent);width:15px;height:15px;margin-top:3px;flex-shrink:0;cursor:pointer}
.choice .choice-text{font-size:0.9rem;line-height:1.55;flex:1}
.choice-letter{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:999px;background:rgba(0,212,232,0.12);border:1px solid rgba(0,212,232,0.18);font-size:0.8rem;font-weight:700;color:var(--accent);flex-shrink:0}
.answer-review{display:flex;flex-direction:column;gap:10px;margin-top:16px}.answer-review-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-radius:10px;border:1px solid var(--border)}.answer-review-item.correct{background:rgba(34,212,122,0.08);border-color:rgba(34,212,122,0.24)}.answer-review-item.incorrect{background:rgba(240,90,90,0.08);border-color:rgba(240,90,90,0.24)}.answer-review-item.missed{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.24)}.answer-review-main{flex:1}.answer-state{font-size:0.74rem;font-weight:700;letter-spacing:.4px;margin:4px 0 6px}.answer-state.correct{color:var(--green)}.answer-state.incorrect{color:var(--red)}.answer-state.missed{color:var(--amber)}.answer-review-item p{margin:0;font-size:0.82rem;line-height:1.55;color:var(--muted)}
.choice.is-correct{border-color:var(--green);background:rgba(34,212,122,0.09)}
.choice.is-wrong{border-color:var(--red);background:rgba(240,90,90,0.09)}
.choice.is-missed{border-color:var(--amber);background:rgba(245,158,11,0.09)}
.choice.locked{cursor:default}
.matrix-scroll{overflow-x:auto;margin-top:4px}
.matrix-tbl{width:100%;border-collapse:collapse;font-size:0.86rem;min-width:480px}
.matrix-tbl th{background:var(--surface2);color:var(--accent);font-weight:600;font-size:0.75rem;letter-spacing:0.4px;padding:10px 12px;border:1px solid var(--border);text-align:center}
.matrix-tbl th:first-child{text-align:left;width:38%}
.matrix-tbl td{padding:10px 12px;border:1px solid var(--border2);vertical-align:middle}
.matrix-tbl td:first-child{font-size:0.86rem;line-height:1.45}
.matrix-tbl td:not(:first-child){text-align:center}
.matrix-tbl tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
.matrix-tbl input[type="radio"]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
.matrix-tbl tr.m-correct td:first-child{color:var(--green)}
.matrix-tbl tr.m-wrong td:first-child{color:var(--red)}
.m-hint{display:block;font-size:0.72rem;margin-top:4px;font-weight:500}
.rationale{display:none;background:rgba(0,212,232,0.05);border:1px solid rgba(0,212,232,0.2);border-radius:10px;padding:16px 18px;margin-top:20px}
.rationale.visible{display:block}
.rationale-label{font-size:0.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
.rationale-body{font-size:0.875rem;line-height:1.7;color:var(--muted)}
.rationale-body strong{color:var(--text);font-weight:600}
.choice-letter{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:999px;background:rgba(0,212,232,0.1);border:1px solid rgba(0,212,232,0.18);color:var(--accent);font-size:0.78rem;font-weight:700;line-height:1;margin-top:1px;flex-shrink:0}
.answer-review{display:grid;gap:10px;margin-top:14px}
.answer-review-item{display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px}
.answer-review-item.correct{border-color:rgba(34,212,122,0.35);background:rgba(34,212,122,0.08)}
.answer-review-item.incorrect{border-color:rgba(240,90,90,0.35);background:rgba(240,90,90,0.08)}
.answer-review-item.missed{border-color:rgba(245,158,11,0.35);background:rgba(245,158,11,0.08)}
.answer-review-main{flex:1}
.answer-review-main p{font-size:0.82rem;line-height:1.55;color:var(--muted);margin-top:3px}
.answer-state{display:inline-flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-top:6px}
.answer-state.correct{color:var(--green)}
.answer-state.incorrect{color:var(--red)}
.answer-state.missed{color:var(--amber)}
.subnote{display:block;margin-top:8px;font-size:0.72rem;color:var(--muted)}
.score-tag{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:600;margin-top:12px;padding:5px 12px;border-radius:20px}
.score-tag.pass{background:rgba(34,212,122,0.14);color:var(--green)}
.score-tag.partial{background:rgba(245,158,11,0.14);color:var(--amber)}
.score-tag.fail{background:rgba(240,90,90,0.14);color:var(--red)}
.btn-bar{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:opacity 0.18s,transform 0.12s}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-check{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#071525}
.btn-nav{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-finish{background:linear-gradient(135deg,#0891b2,#22d47a);color:#071525}
.btn-restart{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.hidden{display:none!important}
.final-wrap{max-width:640px;margin:40px auto;padding:0 16px}
.final-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 36px 36px;text-align:center;position:relative;overflow:hidden}
.final-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent2),var(--accent),var(--green))}
.final-eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.final-score{font-size:5.5rem;font-weight:800;line-height:1;margin-bottom:4px}
.final-pct-label{font-size:0.9rem;color:var(--muted);margin-bottom:28px}
.final-grade{font-size:1.35rem;font-weight:700;margin-bottom:6px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:28px 0}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 10px;font-size:0.78rem;color:var(--muted)}
.stat-box strong{display:block;font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:2px}
@media(max-width:580px){.q-card{padding:22px 18px}.matrix-tbl th,.matrix-tbl td{padding:8px 8px;font-size:0.76rem}.stat-grid{grid-template-columns:1fr 1fr}.final-score{font-size:4rem}}
</style>

<body>
<header class="site-header">
  <div class="kicker">PP2 · Spring 2026</div>
  <h1>Psychosis &amp; <span>Bipolar</span> Pharmacology</h1>
  <p class="subtitle">Antipsychotic Agents · Mood Stabilizers · Neurotransmitters · 80 Questions<span class="subnote">Answer choices are shuffled each attempt, and rationale labels track the live choice order.</span></p>
</header>
<div class="progress-zone">
  <div class="progress-meta"><span id="qCounter">Question 1 of 80</span><span id="qPct">2%</span></div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:2%"></div></div>
</div>
<div class="main" id="quizMain"></div>
<div class="btn-bar main" id="btnBar" style="max-width:860px;margin:16px auto 0;">
  <button class="btn btn-nav hidden" id="btnPrev" onclick="nav(-1)">← Back</button>
  <button class="btn btn-check" id="btnCheck" onclick="checkAnswer()">Check Answer</button>
  <button class="btn btn-nav hidden" id="btnNext" onclick="nav(1)">Next →</button>
  <button class="btn btn-finish hidden" id="btnFinish" onclick="showFinal()">Finish &amp; Score →</button>
</div>
<div id="finalSection" class="hidden"></div>
<script>
const QS=[
// Q1 MCQ
{type:'mcq',stem:'The nurse prepares to administer the first dose of haloperidol (Haldol) to a client admitted with acute psychosis. One hour after administration, which assessment is the nurse\'s <strong>highest priority</strong>?',choices:[{t:'Obtain orthostatic blood pressure measurements with the client supine, then sitting or standing',c:true},{t:'Evaluate short-term memory and level of orientation to person, place, and time',c:false},{t:'Assess range of motion of the upper and lower extremities for early rigidity',c:false},{t:'Auscultate bowel sounds and palpate the abdomen for distention related to constipation',c:false}],rat:'<strong>Correct: A.</strong> Antipsychotic drugs cause orthostatic hypotension by blocking alpha₁-adrenergic receptors on blood vessels, preventing compensatory vasoconstriction when the client stands. BP and pulse must be assessed before dosing and 1 hour after, measured in both lying and sitting/standing positions. Tolerance to hypotension typically develops after 2–3 months. While B, C, and D are all relevant ongoing assessments, hemodynamic safety is the immediate priority in the first hour after the first dose.'},

// Q2 SATA
{type:'sata',stem:'A client is prescribed haloperidol (Haldol) for acute psychosis. Which adverse effects should the nurse anticipate and monitor for during therapy? <strong>Select all that apply.</strong>',choices:[{t:'Extrapyramidal symptoms (EPS)',c:true},{t:'Orthostatic hypotension',c:true},{t:'Prolonged QT interval and risk of ventricular dysrhythmias',c:true},{t:'Agranulocytosis',c:true},{t:'Anticholinergic effects — dry mouth, urinary hesitancy, constipation, blurred vision',c:true},{t:'Stevens-Johnson syndrome (SJS)',c:false},{t:'Significant metabolic syndrome with marked weight gain and new-onset diabetes',c:false}],rat:'<strong>Correct: A, B, C, D, E.</strong> Haloperidol (FGA/butyrophenone) adverse effects include EPS, NMS, orthostatic hypotension, sedation, sexual dysfunction, agranulocytosis, anticholinergic effects, and QT prolongation (V-fib risk). <strong>F incorrect:</strong> Stevens-Johnson syndrome is associated with ziprasidone (SGA), not haloperidol. <strong>G incorrect:</strong> Significant metabolic syndrome is primarily associated with SGAs, not FGAs like haloperidol.'},

// Q3 MATRIX
{type:'matrix',stem:'For each clinical scenario, identify which type of <strong>extrapyramidal symptom (EPS)</strong> is being described.',cols:['Acute Dystonia','Drug-induced Parkinsonism','Akathisia','Tardive Dyskinesia'],rows:[{t:'A client on haloperidol develops involuntary muscular contractions, rhythmic jerks, and twisting of the neck and trunk with increased muscle tone — appearing within 24 hours of the first dose.',ans:'Acute Dystonia'},{t:'A client on chlorpromazine exhibits extreme slowness of movement, a mask-like facial expression, cogwheel rigidity, a shuffling gait, and drooling — emerging over the first week of therapy.',ans:'Drug-induced Parkinsonism'},{t:'A client on risperidone continuously paces the hallways and states, "I cannot sit still — I absolutely have to keep moving." The client is unable to remain seated during meals.',ans:'Akathisia'},{t:'A client on long-term haloperidol develops lip-smacking movements, worm-like tongue protrusions in a "fly-catching" motion, and involuntary movements of the fingers and trunk that interfere with swallowing.',ans:'Tardive Dyskinesia'}],rat:'<strong>Acute Dystonia:</strong> Involuntary contractions, twisting, rhythmic jerks, and increased muscle tone — early in therapy. Treated with anticholinergics (benztropine, diphenhydramine) IM/IV. <strong>Drug-induced Parkinsonism:</strong> Bradykinesia, mask-like face, cogwheel rigidity, shuffling gait, drooling — mirrors Parkinson\'s because both involve D2 blockade. Treated with benztropine, trihexyphenidyl, diphenhydramine, or amantadine. <strong>Akathisia (a=without, kathis=sitting):</strong> Motor restlessness and intolerance of inactivity. Treated with beta-blockers, benzodiazepines, or anticholinergics, or switching to low-potency FGA. <strong>Tardive Dyskinesia:</strong> Late-onset, worm-like tongue movements, lip-smacking, involuntary limb movements. Can cause malnutrition. Treated with dose reduction, switch to SGA, or valbenazine.'},

// Q4 MCQ
{type:'mcq',stem:'A client has been receiving antipsychotic therapy for 8 months. The client now exhibits twisting, worm-like movements of the tongue and face, lip-smacking movements, and involuntary finger and trunk movements that are interfering with chewing and swallowing — resulting in unintentional weight loss. The nurse recognizes the client is most likely experiencing which complication?',choices:[{t:'Tardive dyskinesia',c:true},{t:'Akathisia',c:false},{t:'Drug-induced parkinsonism',c:false},{t:'Neuroleptic malignant syndrome (NMS)',c:false}],rat:'<strong>Correct: A.</strong> Tardive dyskinesia is a late adverse effect of prolonged antipsychotic therapy characterized by worm-like tongue movements, lip-smacking, fly-catching tongue protrusions, and involuntary movements of limbs, fingers, toes, and trunk — interfering with chewing, swallowing, and speaking and causing malnutrition and weight loss. <strong>B incorrect:</strong> Akathisia presents as motor restlessness and pacing, not oro-facial movements. <strong>C incorrect:</strong> Drug-induced parkinsonism presents with bradykinesia, mask-like face, cogwheel rigidity, and shuffling gait. <strong>D incorrect:</strong> NMS presents with lead-pipe rigidity, sudden high fever, altered consciousness, and autonomic instability.'},

// Q5 SATA
{type:'sata',stem:'A client receiving chlorpromazine develops neuroleptic malignant syndrome (NMS). Which clinical manifestations should the nurse recognize as consistent with this condition? <strong>Select all that apply.</strong>',choices:[{t:'"Lead pipe" muscle rigidity',c:true},{t:'Sudden high fever (hyperthermia)',c:true},{t:'Worm-like tongue and lip-smacking movements',c:false},{t:'Altered level of consciousness',c:true},{t:'Tachycardia, dysrhythmias, and fluctuations in blood pressure',c:true},{t:'Rhabdomyolysis and risk of acute kidney failure',c:true},{t:'Pacing and squirming due to motor restlessness',c:false},{t:'Diaphoresis (profuse sweating)',c:true}],rat:'<strong>Correct: A, B, D, E, F, H.</strong> NMS is characterized by "lead pipe" muscle rigidity, sudden high fever, altered consciousness, diaphoresis, autonomic instability (tachycardia, dysrhythmias, BP fluctuations), and can progress to rhabdomyolysis and acute kidney failure. Death can result from respiratory failure, cardiovascular collapse, or dysrhythmias. <strong>Treatment:</strong> Immediate antipsychotic withdrawal, cooling blankets, antipyretics, IV hydration, benzodiazepines, dantrolene, and bromocriptine. <strong>C incorrect:</strong> Worm-like tongue movements describe tardive dyskinesia. <strong>G incorrect:</strong> Pacing and motor restlessness describe akathisia.'},

// Q6 MATRIX
{type:'matrix',stem:'For each clinical scenario, determine whether administering a <strong>first-generation antipsychotic (FGA)</strong> is <em>Indicated</em>, <em>Contraindicated</em>, or <em>Not Indicated</em> based on course content.',cols:['Indicated','Contraindicated','Not Indicated'],rows:[{t:'A 44-year-old client admitted for an acute schizophrenic episode with prominent auditory hallucinations and paranoid delusions',ans:'Indicated'},{t:'A 79-year-old client with Alzheimer\'s disease being treated for dementia-related behavioral disturbances and psychosis',ans:'Contraindicated'},{t:'A 36-year-old client with recently diagnosed open-angle glaucoma who presents with an acute psychotic episode',ans:'Contraindicated'},{t:'A 29-year-old client with drug-induced psychosis and no significant medical or ophthalmologic history',ans:'Indicated'},{t:'A 50-year-old client with bipolar disorder experiencing an acute manic episode with psychotic features',ans:'Indicated'}],rat:'<strong>Indicated:</strong> Schizophrenia is the primary indication; drug-induced psychosis and bipolar disorder with psychotic features are also within the therapeutic spectrum. <strong>Contraindicated — older adults with dementia:</strong> FGAs and SGAs are not recommended in older adults with dementia-related psychosis due to approximately double the mortality rate. <strong>Contraindicated — glaucoma:</strong> FGAs are contraindicated in glaucoma; anticholinergic effects (pupil dilation) can worsen intraocular pressure.'},

// Q7 SATA
{type:'sata',stem:'A client with bipolar disorder is prescribed lithium carbonate. Which nursing considerations should the nurse apply when managing this client\'s care? <strong>Select all that apply.</strong>',choices:[{t:'Draw serum lithium levels in the morning, 12 hours after the evening dose',c:true},{t:'Instruct the client to restrict dietary sodium intake to reduce the risk of lithium toxicity',c:false},{t:'Assess baseline cardiac, renal, electrolyte, hematologic, and thyroid status before initiating therapy',c:true},{t:'Advise the client to maintain adequate fluid intake and prevent dehydration',c:true},{t:'Instruct the client to avoid NSAIDs, diuretics, and anticholinergics during therapy',c:true},{t:'Inform the client that lithium is safe to use throughout pregnancy',c:false},{t:'Notify the provider if serum lithium levels exceed 1.5 mEq/L, as this indicates toxicity',c:true}],rat:'<strong>Correct: A, C, D, E, G.</strong> Lithium management: levels drawn 12 hours post-evening-dose; baseline cardiac/hematologic/electrolyte/renal/thyroid assessments; adequate fluid intake; avoid NSAIDs (raise lithium levels), diuretics, and anticholinergics. Toxicity occurs at >1.5 mEq/L. <strong>B incorrect:</strong> Sodium restriction is dangerous — when sodium is low, kidneys reabsorb more lithium, increasing serum levels and toxicity risk. Maintain normal sodium intake. <strong>F incorrect:</strong> Lithium is teratogenic; contraindicated during pregnancy.'},

// Q8 MCQ
{type:'mcq',stem:'A client with treatment-resistant schizophrenia who has failed multiple antipsychotic trials is started on clozapine (Clozaril). Which laboratory monitoring is <strong>specific to clozapine</strong> and required as part of the REMS program before each prescription can be dispensed?',choices:[{t:'White blood cell (WBC) count and absolute neutrophil count (ANC)',c:true},{t:'Serum potassium level and 12-lead ECG for QT interval monitoring',c:false},{t:'Liver function tests and serum bilirubin to assess hepatotoxicity',c:false},{t:'Fasting lipid panel and fasting blood glucose for metabolic syndrome screening',c:false}],rat:'<strong>Correct: A.</strong> Clozapine requires REMS enrollment due to potentially fatal agranulocytosis risk. WBC and ANC must meet thresholds before each prescription can be dispensed — this is the unique, non-negotiable REMS safety requirement. B (ECG/potassium) is relevant for QT monitoring but not the REMS criterion. C (LFTs) is not the defining REMS requirement. D (metabolic labs) — while important for SGA monitoring, it is not the REMS requirement. Clozapine carries the highest metabolic risk among SGAs.'},

// Q9 SATA
{type:'sata',stem:'A client is prescribed olanzapine (Zyprexa) for schizophrenia. Which adverse effects should the nurse anticipate and monitor for during therapy? <strong>Select all that apply.</strong>',choices:[{t:'Metabolic syndrome — weight gain, new-onset diabetes, and dyslipidemia',c:true},{t:'Orthostatic hypotension',c:true},{t:'Extrapyramidal symptoms (EPS)',c:true},{t:'Neuroleptic malignant syndrome (NMS)',c:true},{t:'Agranulocytosis',c:true},{t:'Contact dermatitis and photosensitivity with sun exposure',c:false},{t:'Drowsiness and sedation',c:true}],rat:'<strong>Correct: A, B, C, D, E, G.</strong> Olanzapine (SGA) adverse effects: metabolic syndrome, orthostatic hypotension, EPS, NMS, agranulocytosis, constipation, and drowsiness. SGAs have fewer EPS than FGAs but greater metabolic risk. <strong>F incorrect:</strong> Contact dermatitis and photosensitivity are specifically associated with phenothiazine-class FGAs (e.g., chlorpromazine) due to drug accumulation in skin. Stevens-Johnson syndrome is associated with ziprasidone, not olanzapine.'},

// Q10 MATRIX
{type:'matrix',stem:'For each drug used in the management of <strong>EPS or NMS</strong>, identify the correct pharmacological classification.',cols:['Anticholinergic agent','Dopamine releaser','Direct-acting muscle relaxant','Dopamine receptor agonist'],rows:[{t:'Benztropine mesylate (Cogentin) — HESI prototype for EPS management',ans:'Anticholinergic agent'},{t:'Trihexyphenidyl (Artane) — used for antipsychotic-induced parkinsonism',ans:'Anticholinergic agent'},{t:'Amantadine — promotes dopamine availability in the synaptic cleft',ans:'Dopamine releaser'},{t:'Dantrolene (Dantrium) — reduces rigidity and hyperthermia in NMS',ans:'Direct-acting muscle relaxant'},{t:'Bromocriptine (Parlodel) — relieves CNS toxicity in NMS',ans:'Dopamine receptor agonist'}],rat:'<strong>Benztropine &amp; Trihexyphenidyl → Anticholinergic:</strong> Block acetylcholine receptors, restoring dopamine/acetylcholine balance. Used for acute dystonia and drug-induced parkinsonism. Beers Criteria warning for older adults — can cause confusion, disorientation, psychotic-like symptoms. Contraindicated in glaucoma. <strong>Amantadine → Dopamine releaser:</strong> Promotes dopamine release and blocks reuptake. Used for antipsychotic-induced parkinsonism. Reassess after a few months as neuroleptic-induced parkinsonism often resolves. <strong>Dantrolene → Direct-acting muscle relaxant:</strong> Reduces rigidity and hyperthermia in NMS. <strong>Bromocriptine → Dopamine receptor agonist:</strong> Relieves CNS toxicity in NMS.'},

// Q11 SATA
{type:'sata',stem:'A client with schizophrenia has been receiving risperidone (Risperdal) for 6 weeks. The nurse evaluates the client for a therapeutic response. Which findings indicate the medication is producing the <strong>expected therapeutic effect</strong>? <strong>Select all that apply.</strong>',choices:[{t:'The client reports no longer hearing voices telling them to harm others',c:true},{t:'The client has stopped expressing fixed false beliefs about being under government surveillance',c:true},{t:'The client is initiating conversation with peers and independently completing hygiene tasks without prompting',c:true},{t:'The client demonstrates no evidence of tardive dyskinesia after 6 weeks of therapy',c:false},{t:'The client\'s speech is now organized, coherent, and comprehensible compared to admission',c:true},{t:'The client demonstrates decreased agitation, tension, and paranoia',c:true},{t:'The client denies any extrapyramidal symptoms throughout the course of therapy',c:false}],rat:'<strong>Correct: A, B, C, E, F.</strong> SGAs improve all three symptom domains: <em>Positive</em> (hallucinations, delusions, agitation, paranoia — A, B, F); <em>Negative</em> (motivation, self-care, social engagement — C); <em>Cognitive</em> (disordered thinking and speech — E). Three major treatment objectives: suppression of acute episodes, prevention of exacerbations, and maintenance of the highest possible level of functioning. <strong>D incorrect:</strong> Absence of tardive dyskinesia at 6 weeks reflects tolerability, not therapeutic efficacy — TD is a late adverse effect. <strong>G incorrect:</strong> Absence of EPS reflects side-effect management, not the therapeutic goal.'},

// Q12 MCQ
{type:'mcq',stem:'A client receiving fluphenazine for schizophrenia reports an uncontrollable need to keep moving, cannot tolerate sitting still during meals, and has been pacing the unit for hours. The nurse identifies this as akathisia and notifies the provider. Which intervention does the nurse anticipate will be prescribed?',choices:[{t:'Administer dantrolene (Dantrium) to reduce muscle-related restlessness',c:false},{t:'Administer diphenhydramine (Benadryl) IV for rapid resolution of symptoms',c:false},{t:'Administer a beta-blocker, benzodiazepine, or anticholinergic — or consider switching to a low-potency FGA',c:true},{t:'Immediately and permanently discontinue the antipsychotic medication',c:false}],rat:'<strong>Correct: C.</strong> Akathisia is treated with beta-blockers, benzodiazepines, or anticholinergics, or by switching to a low-potency FGA. <strong>A incorrect:</strong> Dantrolene is used specifically for NMS. <strong>B incorrect:</strong> Diphenhydramine IM/IV is used for acute dystonia and drug-induced parkinsonism — not akathisia. <strong>D incorrect:</strong> Abrupt discontinuation is only indicated for medical emergencies like NMS. Abrupt withdrawal risks abstinence syndrome and relapse. Pharmacologic management or medication switch is appropriate for akathisia.'},

// Q13 SATA
{type:'sata',stem:'The nurse provides discharge education to a client newly prescribed clozapine (Clozaril) for treatment-resistant schizophrenia. Which statements should the nurse include in the teaching? <strong>Select all that apply.</strong>',choices:[{t:'"You will need routine blood draws to monitor your white blood cell count before each prescription is filled."',c:true},{t:'"Clozapine is the preferred first-line treatment for all clients diagnosed with schizophrenia."',c:false},{t:'"Report any sign of infection — such as fever, sore throat, or unusual fatigue — to your provider immediately."',c:true},{t:'"Avoid drinking alcohol while taking this medication."',c:true},{t:'"You may notice weight gain and changes in your blood sugar while taking this medication — we will monitor these closely."',c:true},{t:'"You may stop clozapine on your own if you feel better or if the side effects become bothersome."',c:false}],rat:'<strong>Correct: A, C, D, E.</strong> Clozapine education: REMS monitoring with WBC/ANC before each prescription (A); immediate reporting of infection signs due to agranulocytosis risk (C); alcohol avoidance due to additive CNS depressant effects (D); monitoring for metabolic syndrome — weight gain, blood sugar changes (E). <strong>B incorrect:</strong> Clozapine is NOT first-line — reserved for severe, treatment-resistant schizophrenia when safer alternatives have failed due to agranulocytosis risk. <strong>F incorrect:</strong> Antipsychotics must not be stopped abruptly; must be taken consistently even when feeling well.'},

// Q14 MATRIX
{type:'matrix',stem:'For each assessment finding related to <strong>mood stabilizer therapy</strong>, identify whether the finding represents a <em>Therapeutic Response</em>, an <em>Adverse Effect Requiring Monitoring</em>, or a <em>Sign of Toxicity</em> requiring immediate action.',cols:['Therapeutic Response','Adverse Effect Requiring Monitoring','Sign of Toxicity'],rows:[{t:'A client on lithium reports a serum level of 1.8 mEq/L along with nausea, tremors, and disorientation',ans:'Sign of Toxicity'},{t:'A client on divalproex (Depakote) reports that manic episodes have decreased significantly in both frequency and severity since starting the medication',ans:'Therapeutic Response'},{t:'A client on divalproex reports new-onset severe abdominal pain, persistent nausea and vomiting, and yellowing of the skin and eyes',ans:'Adverse Effect Requiring Monitoring'},{t:'A client on carbamazepine develops visual changes, ataxia, and unsteadiness early in therapy',ans:'Adverse Effect Requiring Monitoring'},{t:'A client on lamotrigine (Lamictal) develops a rapidly spreading skin rash with mucosal involvement',ans:'Sign of Toxicity'}],rat:'<strong>R1 → Toxicity:</strong> Lithium toxicity at levels >1.5 mEq/L. Nausea, tremors, confusion can progress to seizures. <strong>R2 → Therapeutic:</strong> Reduced manic episode frequency/severity confirms divalproex efficacy. <strong>R3 → Adverse requiring action:</strong> Divalproex can cause pancreatitis and liver failure — abdominal pain, nausea, jaundice require urgent evaluation and likely drug withdrawal. <strong>R4 → Adverse requiring monitoring:</strong> Early neurologic side effects of carbamazepine include visual changes, ataxia, vertigo. Monitor trough levels (4–12 mcg/mL). <strong>R5 → Toxicity:</strong> Lamotrigine → Stevens-Johnson syndrome (SJS) risk. Any new rash must be treated as potential SJS until proven otherwise — immediate provider notification required.'},

// Q15 SATA
{type:'sata',stem:'The nurse educates the treatment team about monitoring for extrapyramidal symptoms in a client newly started on haloperidol (Haldol). Which EPS types are most likely to develop <strong>early in the course</strong> of antipsychotic therapy? <strong>Select all that apply.</strong>',choices:[{t:'Acute dystonia',c:true},{t:'Drug-induced parkinsonism',c:true},{t:'Akathisia',c:true},{t:'Tardive dyskinesia',c:false},{t:'Neuroleptic malignant syndrome (NMS)',c:false},{t:'Sedation from histamine receptor blockade in the CNS',c:false}],rat:'<strong>Correct: A, B, C.</strong> Acute dystonia, drug-induced parkinsonism, and akathisia are early EPS — appearing within the first days to weeks of therapy due to acute D2 receptor blockade in the same neuronal network as Parkinson\'s disease. <strong>D incorrect:</strong> Tardive dyskinesia is a late adverse effect — "tardive" means delayed — developing after months to years of therapy. <strong>E incorrect:</strong> NMS is not an EPS — it is a distinct, rare, life-threatening syndrome. <strong>F incorrect:</strong> Sedation from histamine blockade is a CNS adverse effect, not an extrapyramidal symptom.'},

// Q16 MCQ
{type:'mcq',stem:'A client prescribed lithium carbonate for bipolar disorder asks the nurse, "When exactly should I schedule my blood draw to check my lithium level?" Which response by the nurse is <strong>most accurate</strong>?',choices:[{t:'"Have your blood drawn 2 hours after your morning dose to check peak drug levels."',c:false},{t:'"Draw your blood immediately before taking your first dose of the day."',c:false},{t:'"Have your blood drawn in the morning, 12 hours after your evening dose."',c:true},{t:'"Lithium can be drawn at any consistent time each day — timing does not significantly affect the result."',c:false}],rat:'<strong>Correct: C.</strong> Serum lithium levels are drawn in the morning, 12 hours after the evening dose, to capture the trough concentration — the lowest point in the dosing cycle, providing the most clinically reliable result. A (peak at 2 hours) produces falsely elevated values. B (before first dose) approximates a trough but is not the course-specified protocol. D is false — timing significantly affects results and inconsistent timing leads to misinterpretation.'},

// Q17 SATA
{type:'sata',stem:'The nurse is teaching about the neurobiological basis of psychiatric disorders. Which statements accurately describe <strong>neurotransmitter imbalances</strong> associated with psychosis, mood disorders, and anxiety? <strong>Select all that apply.</strong>',choices:[{t:'Excessive activation of CNS dopamine receptors contributes to the positive symptoms of schizophrenia and other psychoses',c:true},{t:'Insufficient activation of CNS glutamate receptors is associated with schizophrenia',c:true},{t:'Too little serotonin in the CNS leads to delusions and hallucinations',c:false},{t:'Too little norepinephrine in the CNS is associated with depression',c:true},{t:'Too little GABA in the CNS is associated with increased anxiety',c:true},{t:'Too much norepinephrine in the CNS is associated with psychosis',c:true}],rat:'<strong>Correct: A, B, D, E, F.</strong> Key imbalances: Dopamine excess → schizophrenia/psychoses (A); glutamate insufficient → schizophrenia (B); norepinephrine too little → depression (D); GABA too little → anxiety (E); norepinephrine too much → psychosis (F). <strong>C incorrect — critical distractor:</strong> It is too <em>much</em> serotonin (not too little) that leads to delusions and hallucinations. Too <em>little</em> serotonin is associated with <em>depression</em>. This reversal is one of the most tested distractor points on pharmacology exams.'},

// Q18 MATRIX
{type:'matrix',stem:'For each neurotransmitter, select the clinical condition associated with having <strong>too little</strong> of that neurotransmitter, based on course content.',cols:['Anxiety','Depression','Parkinson disease','Schizophrenia / Psychosis'],rows:[{t:'Serotonin — regulates sleep, wakefulness, mood, and CNS arousal',ans:'Depression'},{t:'Dopamine — regulates cognition, emotional responses, and motivation',ans:'Parkinson disease'},{t:'GABA (gamma-aminobutyric acid) — major inhibitory neurotransmitter in the brain',ans:'Anxiety'},{t:'Norepinephrine — involved with thinking, planning, and interpreting; controls arousal, attention, vigilance, mood, and affect',ans:'Depression'}],rat:'<strong>Serotonin too little → Depression:</strong> Too little serotonin = depression; too much = delusions and hallucinations. SSRIs block reuptake to treat depression. <strong>Dopamine too little → Parkinson disease:</strong> Parkinson\'s is associated with decreased dopamine and increased acetylcholine. Antipsychotics blocking dopamine can cause drug-induced parkinsonism. <strong>GABA too little → Anxiety:</strong> Too little GABA = anxiety. Benzodiazepines bind to GABA-A receptors and potentiate the inhibitory effect → decrease anxiety. <strong>Norepinephrine too little → Depression:</strong> Too little = depression; too much = psychosis. Tricyclic antidepressants block norepinephrine reuptake.'},

// Q19 SATA
{type:'sata',stem:'The nurse educates a client prescribed divalproex sodium (Depakote) for bipolar disorder. Which information should the nurse include in the teaching? <strong>Select all that apply.</strong>',choices:[{t:'Trough serum levels should be drawn 12 hours after the last dose; the therapeutic range is 50–120 mcg/mL',c:true},{t:'Report any unusual bruising, prolonged bleeding, or petechiae, as thrombocytopenia may occur',c:true},{t:'This medication is safe to take throughout pregnancy without any restrictions',c:false},{t:'Immediately report severe abdominal pain, persistent nausea and vomiting, or yellowing of the skin or eyes',c:true},{t:'Divalproex can be used alone or combined with other mood stabilizers as part of bipolar disorder management',c:true},{t:'Skipping doses on days when mood feels stable will not significantly affect treatment',c:false}],rat:'<strong>Correct: A, B, D, E.</strong> Divalproex teaching: therapeutic trough 50–120 mcg/mL at 12 hours (A); report thrombocytopenia signs (B); immediately report pancreatitis/liver failure signs — abdominal pain, nausea, jaundice (D); can be used alone or in combination (E). <strong>C incorrect:</strong> Divalproex is teratogenic — not safe in pregnancy. <strong>F incorrect:</strong> Must be taken consistently as prescribed. Irregular dosing leads to subtherapeutic levels and increased relapse risk into mania or depression.'},

// Q20 SATA
{type:'sata',stem:'The nurse reviews discharge medication instructions with a client prescribed chlorpromazine (Thorazine) for schizophrenia. Which client statements indicate a <strong>need for further teaching</strong>? <strong>Select all that apply.</strong>',choices:[{t:'"I will stand up slowly and sit on the edge of the bed before getting up to prevent dizziness."',c:false},{t:'"Once my hallucinations go away, I plan to stop taking this medication on my own."',c:true},{t:'"I will avoid drinking alcohol while on this medication."',c:false},{t:'"I will apply sunscreen and wear protective clothing whenever I go outside."',c:false},{t:'"Since this medication is not addictive, I can take extra doses if I feel more anxious."',c:true},{t:'"I understand the medication might cause some sexual side effects, but I\'ll talk to my provider before stopping."',c:false},{t:'"I only need to take this medication when I feel like my symptoms are getting worse."',c:true}],rat:'<strong>Require further teaching: B, E, G.</strong> <strong>B:</strong> Antipsychotics must be taken on a regular schedule — symptom improvement is the result of the medication, not a sign to stop; abrupt discontinuation risks relapse. <strong>E:</strong> Extra doses are dangerous — risk of hypotension, EPS, and CNS depression. Dosing is prescribed and individualized. <strong>G:</strong> Antipsychotics must be taken consistently — PRN dosing cannot maintain adequate plasma levels for psychiatric disease management. <strong>A, C, D, F</strong> all reflect accurate understanding (orthostatic precautions, alcohol avoidance, sun protection specific to phenothiazines, provider communication).'},

// Q21 MCQ
{type:'mcq',stem:'The nurse explains to a nursing student why antipsychotic medications cause sedation. Which statement best explains the underlying mechanism responsible for sedation associated with first-generation antipsychotics?',choices:[{t:'Blockade of dopamine D2 receptors in the basal ganglia and limbic system',c:false},{t:'Blockade of histamine receptors in the central nervous system',c:true},{t:'Blockade of alpha₁-adrenergic receptors on blood vessels',c:false},{t:'Blockade of acetylcholine muscarinic receptors in the peripheral nervous system',c:false}],rat:'<strong>Correct: B.</strong> Sedation from antipsychotic drugs results from histamine receptor blockade in the CNS. Due to this sedating effect, antipsychotics are often administered at bedtime (HS) to leverage the sedative effect. <strong>A:</strong> Dopamine D2 blockade explains the antipsychotic effect and EPS — not sedation. <strong>C:</strong> Alpha₁ receptor blockade explains orthostatic hypotension. <strong>D:</strong> Acetylcholine muscarinic blockade (anticholinergic effects) explains dry mouth, urinary hesitancy, constipation, and tachycardia — not sedation.'},

// Q22 SATA
{type:'sata',stem:'The nurse reviews a client\'s medication list for potential drug interactions with haloperidol (Haldol). Which drug classes or specific agents require clinical caution due to known interactions with antipsychotic medications? <strong>Select all that apply.</strong>',choices:[{t:'Anticholinergic agents — risk of intensifying anticholinergic effects',c:true},{t:'CNS depressants including alcohol — risk of intensified CNS depression',c:true},{t:'Levodopa and direct dopamine receptor agonists — may counteract antipsychotic effects',c:true},{t:'Antihypertensive medications — may potentiate hypotensive effects',c:true},{t:'NSAIDs — may raise antipsychotic plasma levels to toxic ranges',c:false},{t:'Parkinson\'s disease medications — risk of counteracting dopamine-blocking effects',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> Anticholinergics intensify anticholinergic effects (dry mouth, urinary retention, constipation, tachycardia); CNS depressants and alcohol intensify CNS depression — avoid alcohol; levodopa and dopamine agonists counteract the antipsychotic effect (opposing mechanisms); antihypertensives can potentiate orthostatic hypotension; Parkinson\'s drugs (dopamine agonists) counteract dopamine blockade. <strong>E incorrect:</strong> NSAIDs are a concern with <em>lithium</em> (raise lithium levels and risk toxicity) — not a significant antipsychotic interaction per course content.'},

// Q23 SATA
{type:'sata',stem:'A client is started on benztropine mesylate (Cogentin) for antipsychotic-induced acute dystonia. Which adverse effects should the nurse monitor for and include in client teaching? <strong>Select all that apply.</strong>',choices:[{t:'Dry mouth',c:true},{t:'Blurred vision and photophobia',c:true},{t:'Urinary retention',c:true},{t:'Constipation',c:true},{t:'Tachycardia',c:true},{t:'Rhabdomyolysis and myoglobinuria',c:false},{t:'Diarrhea and increased GI motility',c:false}],rat:'<strong>Correct: A, B, C, D, E.</strong> Benztropine is an anticholinergic agent — it blocks acetylcholine receptors, producing the full anticholinergic profile: dry mouth, blurred vision, photophobia, urinary retention, constipation, and tachycardia. Use caution in glaucoma. Beers Criteria warning for older adults: can cause confusion, disorientation, agitation, and psychotic-like symptoms. <strong>F incorrect:</strong> Rhabdomyolysis is associated with NMS, not benztropine. <strong>G incorrect:</strong> Anticholinergics cause constipation (decreased GI motility) — the opposite of diarrhea.'},

// Q24 MATRIX
{type:'matrix',stem:'For each clinical characteristic, identify whether it more specifically describes <strong>FGAs only</strong>, <strong>SGAs only</strong>, or <strong>both FGAs and SGAs</strong>.',cols:['FGAs Only','SGAs Only','Both FGAs and SGAs'],rows:[{t:'Higher risk of extrapyramidal symptoms (EPS) due to strong D2 receptor blockade',ans:'FGAs Only'},{t:'Higher risk of metabolic syndrome — weight gain, new-onset diabetes, dyslipidemia',ans:'SGAs Only'},{t:'Should not be used to treat dementia-related psychosis in older adults due to increased mortality risk',ans:'Both FGAs and SGAs'},{t:'Risk of QT interval prolongation and potentially lethal ventricular dysrhythmias',ans:'Both FGAs and SGAs'},{t:'Risk of agranulocytosis — monitor WBC and report signs of infection',ans:'Both FGAs and SGAs'}],rat:'<strong>FGAs Only — EPS:</strong> Significant EPS risk due to strong D2 blockade; SGAs have fewer EPS due to moderate D2 and stronger serotonin blockade. <strong>SGAs Only — Metabolic syndrome:</strong> Weight gain, diabetes, dyslipidemia are the defining concern of SGAs (greatest risk with clozapine and olanzapine). <strong>Both — Dementia contraindication:</strong> Both FGAs and SGAs carry black box warnings against use in older adults with dementia-related psychosis (approximately doubles mortality). <strong>Both — QT prolongation:</strong> FGAs prolong QT (check ECG and potassium); several SGAs also prolong QT (risperidone, aripiprazole, quetiapine). <strong>Both — Agranulocytosis:</strong> Both classes carry this risk; most closely monitored for clozapine via REMS.'},

// Q25 MCQ
{type:'mcq',stem:'The nurse is educating a nursing student about antipsychotic drug selection for schizophrenia. Which statement by the nurse is most accurate regarding comparative effectiveness among antipsychotic agents?',choices:[{t:'All FGAs and SGAs are equally effective, making drug selection based solely on the side effect profile',c:false},{t:'SGAs are universally more effective than FGAs for all three symptom categories of schizophrenia',c:false},{t:'Most FGAs and SGAs are equally effective, except for clozapine, which is more effective than all other antipsychotics',c:true},{t:'FGAs are preferred for negative symptoms while SGAs are preferred for positive symptoms',c:false}],rat:'<strong>Correct: C.</strong> Per course content: most FGAs and SGAs are equally effective in antipsychotic action. Clozapine is the exception — it is more effective than all other antipsychotics, reserved for treatment-resistant cases despite serious adverse effects requiring REMS monitoring. <strong>A partially correct but incomplete:</strong> effectiveness is NOT all equal — clozapine is more effective. <strong>B incorrect:</strong> effectiveness is generally equal between classes except for clozapine. <strong>D incorrect:</strong> FGAs primarily address positive symptoms; SGAs address positive, negative, AND cognitive symptoms.'},

// Q26 SATA
{type:'sata',stem:'The nurse prepares to administer the first dose of chlorpromazine (Thorazine) to a client with schizophrenia. Which assessments should the nurse complete <strong>before</strong> administering this medication? <strong>Select all that apply.</strong>',choices:[{t:'Baseline blood pressure in both lying and standing positions',c:true},{t:'Current medication list — specifically checking for anticholinergics, antihypertensives, CNS depressants, and Parkinson\'s medications',c:true},{t:'Assess for a history of glaucoma or cardiovascular disease',c:true},{t:'Serum glucose and weight to establish a metabolic baseline',c:true},{t:'Assess urinary patterns and history of urinary hesitancy or retention',c:true},{t:'Serum lithium level to rule out toxicity before initiating antipsychotic therapy',c:false},{t:'Baseline motor assessment to differentiate pre-existing from drug-induced EPS',c:true}],rat:'<strong>Correct: A, B, C, D, E, G.</strong> Pre-administration: baseline BP (orthostatic hypotension risk — A); medication reconciliation for interactions (B); contraindications — glaucoma and CV disease (C); metabolic baseline for ongoing monitoring (D); urinary hesitancy/retention — anticholinergic contraindication concern (E); baseline motor assessment (G). <strong>F incorrect:</strong> Serum lithium levels are specific to lithium therapy monitoring — not a routine pre-antipsychotic assessment unless the client is also on lithium.'},

// Q27 SATA
{type:'sata',stem:'The nurse educates a client prescribed an antipsychotic about orthostatic hypotension. Which statements should the nurse include in the teaching? <strong>Select all that apply.</strong>',choices:[{t:'"Antipsychotic medications block alpha₁-adrenergic receptors, which prevents the normal compensatory tightening of blood vessels when you stand up."',c:true},{t:'"You may feel lightheaded or dizzy when standing up quickly — this is called orthostatic hypotension."',c:true},{t:'"If you feel dizzy or lightheaded after standing, sit down or lie down immediately until the feeling passes."',c:true},{t:'"Always change positions slowly — sit on the edge of the bed for a minute before standing."',c:true},{t:'"This effect typically improves over 2 to 3 months as your body develops tolerance to the medication."',c:true},{t:'"Orthostatic hypotension only occurs with the first dose and will not recur with continued therapy."',c:false},{t:'"Significantly increase your sodium and fluid intake to prevent low blood pressure episodes."',c:false}],rat:'<strong>Correct: A, B, C, D, E.</strong> Orthostatic hypotension: caused by alpha₁ blockade preventing compensatory vasoconstriction; manifests as lightheadedness/dizziness; management: sit/lie down if symptoms occur, change positions slowly, rise from bed in stages; tolerance develops after 2–3 months. <strong>F incorrect:</strong> Orthostatic hypotension is an ongoing risk throughout therapy, not just with the first dose. <strong>G incorrect:</strong> Increasing sodium is the teaching point for <em>lithium</em> (to prevent toxicity from sodium depletion) — not for antipsychotics. Advising significant sodium increases without a clinical basis is inappropriate.'},

// Q28 MATRIX
{type:'matrix',stem:'For each antipsychotic agent, identify which indication category <strong>most accurately reflects its approved therapeutic use</strong> based on course content.',cols:['Schizophrenia only','Schizophrenia AND Bipolar Disorder','Bipolar Disorder AND Major Depression (broader indication)'],rows:[{t:'Clozapine (Clozaril)',ans:'Schizophrenia only'},{t:'Haloperidol (Haldol)',ans:'Schizophrenia AND Bipolar Disorder'},{t:'Olanzapine (Zyprexa)',ans:'Bipolar Disorder AND Major Depression (broader indication)'},{t:'Quetiapine (Seroquel)',ans:'Bipolar Disorder AND Major Depression (broader indication)'},{t:'Risperidone (Risperdal)',ans:'Schizophrenia AND Bipolar Disorder'}],rat:'<strong>Clozapine → Schizophrenia only:</strong> Most restrictive — reserved for severe, treatment-resistant schizophrenia when safer alternatives have failed. <strong>Haloperidol → Schizophrenia AND Bipolar:</strong> Schizophrenia, bipolar disorder, delusional disorders, depressive psychosis, drug-induced psychoses. <strong>Olanzapine → Broader:</strong> Schizophrenia, bipolar maintenance, acute agitation, AND treatment-resistant major depression (in combination with fluoxetine). <strong>Quetiapine → Broadest:</strong> Schizophrenia, major depression, AND acute mania and depression in bipolar disorder. <strong>Risperidone → Schizophrenia AND Bipolar.</strong>'},

// Q29 MCQ
{type:'mcq',stem:'A client with schizophrenia is prescribed chlorpromazine oral concentrate. The nurse includes which instruction in the teaching plan regarding this specific formulation?',choices:[{t:'"The medication commonly causes excessive salivation due to its anticholinergic effects."',c:false},{t:'"Avoid direct skin contact with this medication — it can cause contact dermatitis in both clients and healthcare personnel."',c:true},{t:'"Sexual function is often enhanced by this medication."',c:false},{t:'"Limit your daily sodium intake to reduce the risk of medication toxicity."',c:false}],rat:'<strong>Correct: B.</strong> Phenothiazine-class antipsychotics (chlorpromazine) can cause contact dermatitis — direct skin contact with the oral concentrate must be avoided by both clients and healthcare personnel. <strong>A incorrect:</strong> Anticholinergics cause DRY mouth — the opposite of excessive salivation. <strong>C incorrect:</strong> Sexual dysfunction (not enhancement) is an adverse effect. <strong>D incorrect:</strong> Sodium restriction applies to <em>lithium</em> (restricting sodium causes the kidneys to retain lithium, increasing toxicity risk) — not chlorpromazine.'},

// Q30 SATA
{type:'sata',stem:'The nurse is monitoring a client on lithium carbonate for bipolar disorder. Which clinical findings indicate signs of <strong>lithium toxicity</strong> rather than expected side effects at therapeutic levels? <strong>Select all that apply.</strong>',choices:[{t:'Serum lithium level of 1.8 mEq/L',c:true},{t:'Mild hand tremors present since the beginning of therapy — stable and not worsening',c:false},{t:'Polyuria and increased thirst (polydipsia) that have been present since therapy started',c:false},{t:'Progressive confusion and disorientation',c:true},{t:'Coarse tremors that are worsening in severity',c:true},{t:'Ataxia and incoordination',c:true},{t:'Acute nausea, vomiting, and diarrhea coinciding with the elevated serum level',c:true}],rat:'<strong>Signs of toxicity: A, D, E, F, G.</strong> Toxicity occurs at levels >1.5 mEq/L (A). Signs: confusion/disorientation (D), worsening coarse tremors (E), ataxia (F), and acute NVD at elevated levels (G) — can progress to seizures and cardiovascular collapse. <strong>B is expected adverse effect:</strong> Mild hand tremors early in therapy at therapeutic levels are tolerable and expected — not toxicity. <strong>C is expected adverse effect:</strong> Polyuria and thirst (polydipsia) are expected adverse effects of therapeutic lithium levels (lithium interferes with renal concentrating ability) — they increase dehydration risk which can precipitate toxicity, but are not toxicity signs by themselves.'},

// Q31 MATRIX
{type:'matrix',stem:'For each EPS type, identify whether onset typically occurs <strong>early in therapy</strong> (first days to weeks) or <strong>late in therapy</strong> (months to years).',cols:['Early in therapy (first days to weeks)','Late in therapy (months to years)'],rows:[{t:'Acute dystonia — involuntary muscular contractions, twisting, rhythmic jerks, and increased muscle tone',ans:'Early in therapy (first days to weeks)'},{t:'Drug-induced parkinsonism — bradykinesia, mask-like face, cogwheel rigidity, shuffling gait, drooling',ans:'Early in therapy (first days to weeks)'},{t:'Akathisia — intolerance of inactivity, motor restlessness, pacing and squirming',ans:'Early in therapy (first days to weeks)'},{t:'Tardive dyskinesia — lip-smacking, worm-like tongue movements, involuntary limb/trunk movements',ans:'Late in therapy (months to years)'}],rat:'<strong>Acute dystonia, drug-induced parkinsonism, and akathisia</strong> are early EPS occurring within the first days to weeks due to acute D2 receptor blockade in the extrapyramidal motor system. They are generally reversible with treatment (anticholinergics, amantadine, beta-blockers, benzodiazepines). <strong>Tardive dyskinesia</strong> is a late-onset EPS — "tardive" means delayed — developing after months to years of continuous antipsychotic therapy, likely from receptor hypersensitivity. It may not be fully reversible. Management: dose reduction, switch to SGA, or valbenazine.'},

// Q32 MCQ
{type:'mcq',stem:'A client ingests a large quantity of haloperidol (Haldol) in an overdose. Which clinical findings does the nurse anticipate based on course content regarding FGA toxicity?',choices:[{t:'Hypertension, agitation, and hyperthermia',c:false},{t:'Hypotension, CNS depression, and extrapyramidal symptoms',c:true},{t:'Bradycardia, respiratory depression, and miosis',c:false},{t:'Tachycardia, diaphoresis, and hyperthermia',c:false}],rat:'<strong>Correct: B.</strong> FGA overdose produces hypotension, CNS depression, and EPS — these are the three hallmarks per course content. Treatment: IV fluids and alpha-adrenergic agonists for hypotension; gastric lavage to remove the drug; antiparkinsonism drugs for EPS. Death by FGA overdose is extremely rare. <strong>A</strong> resembles stimulant toxicity. <strong>C</strong> resembles opioid toxicity (opioid triad). <strong>D</strong> resembles serotonin syndrome or anticholinergic toxicity with hyperthermia — not FGA overdose presentation.'},

// Q33 SATA
{type:'sata',stem:'A client is prescribed quetiapine (Seroquel) for bipolar disorder. Which information should the nurse include in the care plan for this client? <strong>Select all that apply.</strong>',choices:[{t:'Monitor for metabolic syndrome including weight gain, fasting blood glucose changes, and lipid levels',c:true},{t:'Assess for orthostatic hypotension — quetiapine blocks both histamine and alpha₁-adrenergic receptors',c:true},{t:'Monitor QT interval — quetiapine is associated with QT prolongation',c:true},{t:'Quetiapine is approved for schizophrenia, major depression, and acute mania and depression in bipolar disorder',c:true},{t:'Quetiapine must be administered exclusively in the morning to prevent insomnia',c:false},{t:'Teach the client about EPS risk — quetiapine, like all SGAs, still carries some risk of extrapyramidal symptoms',c:true},{t:'Quetiapine carries no risk of NMS because it is a second-generation antipsychotic',c:false}],rat:'<strong>Correct: A, B, C, D, F.</strong> Quetiapine blocks dopamine, serotonin, histamine, and alpha₁ receptors. Adverse effects: metabolic syndrome, orthostatic hypotension, EPS, NMS, drowsiness, agranulocytosis, prolonged QT. Indications: schizophrenia, major depression, acute bipolar mania AND depression — broadest SGA indication. <strong>E incorrect:</strong> Due to histamine blockade causing sedation, quetiapine is often given at bedtime (HS) — not exclusively in the morning. Dosing is individualized. <strong>G incorrect:</strong> NMS can occur with any antipsychotic, including all SGAs. SGAs have less EPS risk than FGAs, but not zero risk for any adverse effect class.'},

// Q34 MATRIX
{type:'matrix',stem:'For each antipsychotic agent, identify the correct <strong>pharmacological classification</strong>.',cols:['Phenothiazine (FGA)','Butyrophenone (FGA)','Second-Generation Antipsychotic (SGA)'],rows:[{t:'Chlorpromazine (Thorazine) — the phenothiazine prototype',ans:'Phenothiazine (FGA)'},{t:'Haloperidol (Haldol) — the butyrophenone prototype',ans:'Butyrophenone (FGA)'},{t:'Clozapine (Clozaril) — prototype SGA, most effective antipsychotic',ans:'Second-Generation Antipsychotic (SGA)'},{t:'Risperidone (Risperdal)',ans:'Second-Generation Antipsychotic (SGA)'},{t:'Aripiprazole (Abilify) — dopamine system stabilizer',ans:'Second-Generation Antipsychotic (SGA)'}],rat:'<strong>FGAs</strong> are divided into phenothiazines (chlorpromazine is the prototype) and butyrophenones (haloperidol is the prototype). Both FGA classes are equivalent in antipsychotic efficacy. FGAs cause significant EPS due to strong D2 blockade. <strong>SGAs</strong> (clozapine, risperidone, olanzapine, quetiapine, ziprasidone, aripiprazole) were introduced in the 1990s. They produce moderate dopamine blockade with stronger serotonin blockade — resulting in fewer EPS but increased metabolic effects. Clozapine is the SGA prototype and most effective antipsychotic overall.'},

// Q35 MCQ
{type:'mcq',stem:'A client develops drug-induced parkinsonism after starting antipsychotic therapy. The provider prescribes amantadine. Which statement best explains amantadine\'s mechanism of action for this condition?',choices:[{t:'"Amantadine blocks acetylcholine receptors to restore the dopamine-acetylcholine balance."',c:false},{t:'"Amantadine promotes the release of dopamine from neurons and blocks dopamine reuptake, increasing available dopamine in the synaptic cleft."',c:true},{t:'"Amantadine directly stimulates dopamine D2 receptors to overcome the antipsychotic blockade."',c:false},{t:'"Amantadine is an antihistamine that reduces muscle rigidity through central sedation."',c:false}],rat:'<strong>Correct: B.</strong> Amantadine is a dopamine releaser — it promotes dopamine release from neurons and blocks reuptake, increasing dopamine availability in the synaptic cleft to counteract the dopamine blockade responsible for antipsychotic-induced parkinsonism. Important note: antiparkinsonism drugs should not continue indefinitely — reassess after a few months because neuroleptic-induced parkinsonism often resolves. <strong>A</strong> describes benztropine (anticholinergic mechanism). <strong>C</strong> describes bromocriptine (direct dopamine receptor agonist). <strong>D</strong> describes diphenhydramine (antihistamine with anticholinergic activity).'},

// Q36 SATA
{type:'sata',stem:'The nurse reviews aripiprazole (Abilify) with a nursing student. Which statements accurately describe aripiprazole? <strong>Select all that apply.</strong>',choices:[{t:'Aripiprazole is classified as a second-generation (atypical) antipsychotic',c:true},{t:'Aripiprazole is considered a dopamine system stabilizer',c:true},{t:'Approved indications include schizophrenia, acute bipolar mania, major depressive disorder, and agitation associated with schizophrenia or bipolar mania',c:true},{t:'Aripiprazole carries a risk of metabolic syndrome, EPS, NMS, and QT prolongation',c:true},{t:'Aripiprazole is the first-line agent reserved for treatment-resistant schizophrenia when other agents have failed',c:false},{t:'Aripiprazole blocks both dopamine and serotonin receptors as part of its mechanism of action',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> Aripiprazole is an SGA (atypical antipsychotic) classified as a dopamine system stabilizer with partial agonist activity at dopamine receptors. Approved indications: schizophrenia, acute bipolar mania, major depressive disorder, and agitation in schizophrenia/bipolar mania. Adverse effects: metabolic syndrome, orthostatic hypotension, EPS, NMS, drowsiness, agranulocytosis, prolonged QT. <strong>E incorrect:</strong> Clozapine is the agent reserved for treatment-resistant schizophrenia — not aripiprazole.'},

// Q37 MATRIX
{type:'matrix',stem:'For each clinical scenario, determine whether initiating a <strong>second-generation antipsychotic (SGA)</strong> is <em>Indicated</em>, <em>Contraindicated</em>, or <em>Not Indicated</em>.',cols:['Indicated','Contraindicated','Not Indicated'],rows:[{t:'A 32-year-old with treatment-resistant schizophrenia who has failed two adequate trials of other antipsychotics — provider considering clozapine',ans:'Indicated'},{t:'A 76-year-old with moderate Alzheimer\'s disease being treated for dementia-related agitation and psychosis',ans:'Contraindicated'},{t:'A 28-year-old experiencing an acute manic episode with psychotic features in the context of bipolar I disorder',ans:'Indicated'},{t:'A client requesting an SGA to treat tension headaches and situational anxiety without any psychotic or mood disorder diagnosis',ans:'Not Indicated'},{t:'A 40-year-old with schizophrenia who developed agranulocytosis on clozapine — provider considering olanzapine',ans:'Indicated'}],rat:'<strong>R1→Indicated:</strong> Clozapine is reserved for treatment-resistant schizophrenia after safer alternatives have failed. <strong>R2→Contraindicated:</strong> SGAs (like FGAs) are not recommended in older adults with dementia-related psychosis — approximately doubles mortality rate. <strong>R3→Indicated:</strong> SGAs are approved for bipolar disorder including acute mania with psychotic features. <strong>R4→Not Indicated:</strong> Antipsychotics are indicated for psychotic disorders, bipolar disorder, and related conditions — not for uncomplicated tension headaches or situational anxiety. <strong>R5→Indicated:</strong> When clozapine is discontinued due to agranulocytosis, switching to another SGA without REMS requirements (olanzapine, risperidone, etc.) is appropriate.'},

// Q38 MCQ
{type:'mcq',stem:'A client with bipolar disorder is prescribed both carbamazepine (Tegretol) and risperidone (Risperdal). The nurse recognizes this combination requires which specific monitoring intervention?',choices:[{t:'Monitor for serotonin syndrome due to additive serotonergic effects of both medications',c:false},{t:'Monitor risperidone plasma levels closely, as carbamazepine lowers risperidone serum concentrations',c:true},{t:'Monitor for QT prolongation, as carbamazepine specifically potentiates risperidone\'s cardiac effects',c:false},{t:'Monitor WBC and ANC, as this combination increases the risk of agranulocytosis requiring REMS enrollment',c:false}],rat:'<strong>Correct: B.</strong> Carbamazepine lowers risperidone plasma levels — a specific drug-drug interaction listed in course materials for risperidone. Carbamazepine is a potent enzyme inducer that increases the metabolism of many drugs, including risperidone, potentially reducing therapeutic efficacy. Monitor for signs of insufficient antipsychotic effect and discuss dose adjustments with the provider. <strong>A:</strong> Serotonin syndrome is not a concern with this combination. <strong>C:</strong> Carbamazepine does not specifically potentiate QT effects with risperidone. <strong>D:</strong> REMS WBC monitoring is specific to clozapine — not required for risperidone.'},

// Q39 SATA
{type:'sata',stem:'The nurse educates a client about managing anticholinergic side effects of antipsychotic medications. Which teaching points should the nurse include? <strong>Select all that apply.</strong>',choices:[{t:'Sip water frequently, chew sugarless gum, or use ice chips to relieve dry mouth',c:true},{t:'Use stool softeners, increase dietary fiber, and maintain adequate fluid intake to prevent constipation',c:true},{t:'Wear sunglasses and limit time in direct sunlight to manage photophobia and blurred vision',c:true},{t:'Report persistent inability to urinate or feelings of incomplete bladder emptying to your provider immediately',c:true},{t:'Restrict fluid intake to prevent urinary retention from worsening',c:false},{t:'Monitor resting heart rate — tachycardia is an expected anticholinergic effect to report if persistent or concerning',c:true},{t:'Use caution with glaucoma — anticholinergic medications can worsen intraocular pressure',c:true}],rat:'<strong>Correct: A, B, C, D, F, G.</strong> Anticholinergic effects management: dry mouth (water, sugarless gum, ice chips — A); constipation (stool softeners, fiber, fluids per course content — B); photophobia/blurred vision (sunglasses — C); urinary retention (report to provider — D); tachycardia (monitor — F); glaucoma precaution (contraindication concern — G). <strong>E incorrect:</strong> Restricting fluids worsens urinary retention and constipation — the opposite of appropriate intervention. Adequate fluid intake is essential when on anticholinergic medications.'},

// Q40 MATRIX
{type:'matrix',stem:'For each mood stabilizer, identify the correct <strong>therapeutic trough level range or priority monitoring requirement</strong> based on course content.',cols:['50–120 mcg/mL (12-hr trough)','4–12 mcg/mL (trough)','1–5 mcg/L','WBC/ANC monitoring via REMS program'],rows:[{t:'Divalproex sodium (Depakote)',ans:'50–120 mcg/mL (12-hr trough)'},{t:'Carbamazepine (Tegretol)',ans:'4–12 mcg/mL (trough)'},{t:'Lamotrigine (Lamictal)',ans:'1–5 mcg/L'},{t:'Clozapine (Clozaril)',ans:'WBC/ANC monitoring via REMS program'}],rat:'<strong>Divalproex → 50–120 mcg/mL:</strong> Therapeutic trough drawn 12 hours post-dose; also monitor for thrombocytopenia, pancreatitis, and liver failure. <strong>Carbamazepine → 4–12 mcg/mL:</strong> Monitor trough plasma levels; also note it lowers risperidone levels; early neuro side effects include visual changes and ataxia. <strong>Lamotrigine → 1–5 mcg/L:</strong> Monitor lab levels; assess for rash/SJS; suicide precautions. <strong>Clozapine → REMS WBC/ANC:</strong> No listed therapeutic serum range in course materials — the defining monitoring requirement is WBC and ANC via the REMS program before each prescription to prevent fatal agranulocytosis.'},

// Q41 SATA
{type:'sata',stem:'The nurse responds to a client on antipsychotic therapy who presents with lead-pipe muscle rigidity, fever of 104°F, altered mental status, tachycardia, and blood pressure fluctuations. NMS is suspected. Which priority interventions should the nurse anticipate? <strong>Select all that apply.</strong>',choices:[{t:'Immediately hold and discontinue the antipsychotic medication',c:true},{t:'Apply cooling blankets and administer antipyretics for hyperthermia management',c:true},{t:'Administer IV fluids for hydration',c:true},{t:'Administer dantrolene to reduce muscle rigidity and hyperthermia',c:true},{t:'Administer bromocriptine to relieve CNS toxicity',c:true},{t:'Administer benzodiazepines as a muscle relaxant to reduce tachycardia and hypertension',c:true},{t:'Restart the antipsychotic at a lower dose once the fever resolves to prevent psychiatric relapse',c:false},{t:'Administer benztropine (Cogentin) to manage the muscle rigidity associated with NMS',c:false}],rat:'<strong>Correct: A, B, C, D, E, F.</strong> NMS treatment from course materials: (1) Immediate antipsychotic withdrawal — most critical first step; (2) Cooling blankets + antipyretics for hyperthermia; (3) IV hydration; (4) Benzodiazepines — muscle relaxant, relieve anxiety, reduce BP and tachycardia; (5) Dantrolene — direct-acting muscle relaxant, reduces rigidity and hyperthermia; (6) Bromocriptine — dopamine receptor agonist, relieves CNS toxicity. <strong>G incorrect:</strong> Do NOT restart the antipsychotic during NMS — the drug must be discontinued. <strong>H incorrect:</strong> Benztropine (anticholinergic) is used for EPS (dystonia, parkinsonism) — not NMS. It would not address the fever or lead-pipe rigidity characteristic of NMS.'},

// Q42 MCQ
{type:'mcq',stem:'A nursing student asks which of the three major objectives of antipsychotic drug therapy represents the ultimate, long-term treatment goal for a client with schizophrenia. Which response by the nurse is most accurate?',choices:[{t:'"The primary long-term goal is prevention of acute exacerbations through ongoing medication."',c:false},{t:'"The primary long-term goal is suppression of hallucinations and delusions during acute episodes."',c:false},{t:'"The primary long-term goal is maintenance of the highest possible level of functioning."',c:true},{t:'"The primary long-term goal is achieving complete remission of all positive and negative symptoms."',c:false}],rat:'<strong>Correct: C.</strong> The three major objectives: (1) suppression of acute episodes, (2) prevention of acute exacerbations, and (3) maintenance of the highest possible level of functioning. While all three are important, maintenance of the highest possible level of functioning represents the overarching, long-term goal that encompasses quality of life, social functioning, and independence. <strong>A and B</strong> are correct objectives but not the ultimate long-term goal. <strong>D incorrect:</strong> Complete remission of all symptoms is not a realistic objective — schizophrenia typically follows a course of acute exacerbations and periods of remission, with residual symptoms.'},

// Q43 SATA
{type:'sata',stem:'The nurse develops a care plan for a client newly started on an SGA for schizophrenia. Which monitoring parameters should the nurse include to specifically address the risk of <strong>metabolic syndrome</strong>? <strong>Select all that apply.</strong>',choices:[{t:'Baseline and periodic weight measurements',c:true},{t:'Fasting blood glucose monitoring',c:true},{t:'Lipid panel — cholesterol and triglyceride levels',c:true},{t:'Blood pressure monitoring for hypertension',c:true},{t:'Serum lithium levels to rule out drug toxicity',c:false},{t:'Monitor for signs of new-onset diabetes — increased thirst, frequent urination, and blurred vision',c:true},{t:'Monitor for signs of agranulocytosis — fever, sore throat, unusual fatigue — and report promptly',c:true}],rat:'<strong>Correct: A, B, C, D, F, G.</strong> SGAs carry metabolic syndrome risk: weight gain, new-onset diabetes, and dyslipidemia. Monitoring includes weight (A), fasting glucose (B), lipid panels (C), blood pressure for cardiovascular risk (D), and assessment for diabetes symptoms — polyuria, polydipsia, blurred vision (F). Agranulocytosis monitoring applies to all antipsychotics (G). <strong>E incorrect:</strong> Lithium level monitoring is specific to lithium therapy — it is not part of SGA metabolic monitoring and is irrelevant unless the client is also receiving lithium.'},

// Q44 MATRIX
{type:'matrix',stem:'For each clinical finding observed in a client receiving antipsychotic therapy, identify the <strong>underlying receptor mechanism</strong> responsible.',cols:['D2 receptor blockade (EPS)','Alpha₁ receptor blockade','Histamine receptor blockade','Muscarinic (acetylcholine) receptor blockade'],rows:[{t:'A client develops shuffling gait, cogwheel rigidity, and a mask-like face while on haloperidol',ans:'D2 receptor blockade (EPS)'},{t:'A client becomes dizzy and nearly faints when rising from a chair after sitting for 30 minutes',ans:'Alpha₁ receptor blockade'},{t:'A client reports extreme difficulty waking in the morning and feels sedated throughout the day',ans:'Histamine receptor blockade'},{t:'A client reports severe dry mouth, inability to urinate, and hard, infrequent stools',ans:'Muscarinic (acetylcholine) receptor blockade'}],rat:'<strong>D2 blockade → EPS (parkinsonism):</strong> Antipsychotics block D2 receptors in the same neuronal network as Parkinson\'s disease, causing drug-induced parkinsonism. <strong>Alpha₁ blockade → Orthostatic hypotension:</strong> Blocking alpha₁ receptors on blood vessels prevents compensatory vasoconstriction when standing, causing BP to fall. <strong>Histamine blockade → Sedation:</strong> CNS histamine promotes wakefulness; blockade causes sedation — administer at bedtime (HS). <strong>Muscarinic blockade → Anticholinergic effects:</strong> Dry mouth, urinary hesitancy/retention, constipation, blurred vision, photophobia, tachycardia — "can\'t pee, can\'t see, can\'t spit, can\'t sh*t."'},

// Q45 MCQ
{type:'mcq',stem:'A client on long-term antipsychotic therapy has developed tardive dyskinesia with lip-smacking, worm-like tongue movements, and involuntary finger movements that are now interfering with eating. The nurse anticipates which management strategy will be most appropriate?',choices:[{t:'Administer benztropine (Cogentin) IM to rapidly resolve involuntary movements',c:false},{t:'Administer dantrolene to reduce muscle-related involuntary movements',c:false},{t:'Reduce the dose, switch to an SGA, or consider adding valbenazine',c:true},{t:'Add amantadine to the treatment plan to restore dopamine-acetylcholine balance',c:false}],rat:'<strong>Correct: C.</strong> Tardive dyskinesia management: reduce dose or drug withdrawal; switch to an SGA (fewer TD risk); add valbenazine (VMAT2 inhibitor specifically approved for tardive dyskinesia). <strong>A incorrect:</strong> Benztropine is used for acute dystonia and drug-induced parkinsonism — not tardive dyskinesia; may actually worsen TD with inappropriate use. <strong>B incorrect:</strong> Dantrolene is used for NMS. <strong>D incorrect:</strong> Amantadine is used for drug-induced parkinsonism, not tardive dyskinesia.'},

// Q46 SATA
{type:'sata',stem:'The nurse prepares to administer a depot antipsychotic preparation (haloperidol decanoate) to a client with schizophrenia. Which nursing considerations apply? <strong>Select all that apply.</strong>',choices:[{t:'Use a large-gauge needle (21 gauge or larger) due to the viscous liquid formulation',c:true},{t:'Administer using the Z-track method in a deep muscle',c:true},{t:'Inform the client that depot preparations are used for long-term maintenance therapy of schizophrenia',c:true},{t:'Depot antipsychotics have been shown to significantly increase the risk of side effects compared to oral formulations',c:false},{t:'Depot preparations can improve medication adherence by eliminating the need for daily oral dosing',c:true},{t:'Monitor the client for EPS and other antipsychotic adverse effects — the same risks apply to depot formulations',c:true}],rat:'<strong>Correct: A, B, C, E, F.</strong> Depot (long-acting injectable) antipsychotics: viscous liquid requires large needle (21 gauge) and Z-track deep muscle injection (A, B); used for long-term maintenance therapy (C); improve adherence by eliminating daily oral dosing (E); same adverse effect risks apply — EPS, NMS, orthostatic hypotension (F). Six available: haloperidol decanoate, fluphenazine decanoate, risperidone microspheres, paliperidone palmitate, aripiprazole, olanzapine pamoate. <strong>D incorrect:</strong> Per course content: "No evidence that depot preparations pose an increased risk of side effects" compared to oral formulations.'},

// Q47 SATA
{type:'sata',stem:'A client with bipolar disorder is prescribed clonazepam as adjunctive therapy during an acute manic episode. Which information should the nurse include in the care plan? <strong>Select all that apply.</strong>',choices:[{t:'Benzodiazepines produce sedative effects by stimulating inhibitory GABA receptors in the CNS',c:true},{t:'Clonazepam is used in bipolar disorder for management of acute mania, insomnia, and anxiety',c:true},{t:'Teach the client to monitor for falls — drowsiness, ataxia, and visual changes are expected side effects',c:true},{t:'Instruct the client that benzodiazepines are non-habit-forming and safe for long-term, open-ended use',c:false},{t:'Advise the client to avoid other CNS depressants including alcohol while taking clonazepam',c:true},{t:'Monitor the client for palpitations, difficulty urinating, and constipation as potential adverse effects',c:true},{t:'Clonazepam can be used in combination with mood stabilizers as part of bipolar disorder management',c:true}],rat:'<strong>Correct: A, B, C, E, F, G.</strong> Clonazepam and lorazepam (benzodiazepines) used as adjunctive bipolar therapy: MOA — stimulate inhibitory GABA receptors → CNS sedation (A); indications — mania/insomnia/anxiety (B); adverse effects — drowsiness, ataxia, visual changes, palpitations, difficulty urinating, constipation (C, F); drug-drug — avoid CNS depressants and alcohol (E); can combine with mood stabilizers (G). <strong>D incorrect:</strong> Benzodiazepines are classified as <em>addictive</em> drugs per course content. Long-term use requires careful monitoring; abrupt discontinuation can cause withdrawal.'},

// Q48 MATRIX

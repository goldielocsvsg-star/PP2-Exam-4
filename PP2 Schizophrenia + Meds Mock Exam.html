{type:'matrix',stem:'For each clinical finding, determine whether it represents a <em>Therapeutic Response</em>, an <em>Expected/Manageable Adverse Effect</em>, or an <em>Adverse Effect Requiring Immediate Action</em>.',cols:['Therapeutic Response','Expected / Manageable Adverse Effect','Requires Immediate Action'],rows:[{t:'A client on olanzapine for schizophrenia now independently completes hygiene and participates in group therapy sessions',ans:'Therapeutic Response'},{t:'A client on haloperidol reports dry mouth and occasional constipation since starting the medication',ans:'Expected / Manageable Adverse Effect'},{t:'A client on chlorpromazine develops a temperature of 104°F, extreme "lead pipe" muscle rigidity, and confusion',ans:'Requires Immediate Action'},{t:'A client on lithium reports mild hand tremors that were present at the beginning of therapy 3 weeks ago and have not worsened',ans:'Expected / Manageable Adverse Effect'},{t:'A client on clozapine presents with a sore throat, fever, and WBC of 1,800 cells/mm³',ans:'Requires Immediate Action'}],rat:'<strong>R1→Therapeutic:</strong> Improved self-care (negative symptom) and social participation — meets treatment objectives. <strong>R2→Expected/Manageable:</strong> Dry mouth and constipation are expected anticholinergic effects — managed with hydration, diet, stool softeners. <strong>R3→Immediate Action:</strong> Fever + lead-pipe rigidity + confusion = NMS. Rare but potentially fatal — requires immediate antipsychotic withdrawal and emergency treatment. <strong>R4→Expected/Manageable:</strong> Mild stable hand tremors early in lithium therapy at therapeutic levels are expected and do not require emergency action — monitor for worsening. <strong>R5→Immediate Action:</strong> Sore throat + fever + WBC 1,800 cells/mm³ = agranulocytosis on clozapine. Life-threatening; requires immediate drug withdrawal and medical intervention. Normal WBC: 4,500–11,000 cells/mm³.'},

// Q49 MCQ
{type:'mcq',stem:'The nurse reviews the medication profile for a client prescribed ziprasidone (Geodon). Which adverse effect is <strong>specifically associated with ziprasidone</strong> and distinguishes it from other second-generation antipsychotics in the course materials?',choices:[{t:'Metabolic syndrome — weight gain, diabetes, and dyslipidemia',c:false},{t:'Agranulocytosis requiring REMS enrollment and WBC monitoring',c:false},{t:'Stevens-Johnson syndrome (SJS) — a potentially life-threatening skin reaction',c:true},{t:'Tardive dyskinesia from prolonged dopamine receptor blockade',c:false}],rat:'<strong>Correct: C.</strong> Ziprasidone (Geodon) is specifically associated with rash and Stevens-Johnson syndrome (SJS) — listed as a distinguishing adverse effect in course materials. SJS is a severe, potentially fatal mucocutaneous reaction. Any new or spreading rash during ziprasidone therapy must be immediately evaluated and the drug potentially discontinued. <strong>A:</strong> Metabolic syndrome applies to all SGAs. <strong>B:</strong> Agranulocytosis requiring REMS is specific to clozapine. <strong>D:</strong> Tardive dyskinesia is associated with long-term use of both FGAs and SGAs (less so with SGAs) — not a distinguishing feature of ziprasidone.'},

// Q50 SATA
{type:'sata',stem:'The nurse reviews medication education with a client prescribed an antipsychotic for schizophrenia. Which client statements indicate a <strong>need for further teaching</strong>? <strong>Select all that apply.</strong>',choices:[{t:'"I\'ll get up slowly from bed and sit at the edge before standing to help prevent dizziness."',c:false},{t:'"Once I stop hearing voices, I\'ll know the medication is working and I can stop taking it."',c:true},{t:'"I should avoid drinking alcohol while taking this medication."',c:false},{t:'"If I develop a sudden high fever with stiff muscles, I need to seek emergency care immediately."',c:false},{t:'"I can take an extra dose when I feel more anxious or stressed."',c:true},{t:'"Since I\'m not a drug addict, I don\'t need to worry about becoming addicted to this medication."',c:false},{t:'"I only need to take this medication when I feel like my symptoms are getting worse."',c:true}],rat:'<strong>Require further teaching: B, E, G.</strong> <strong>B:</strong> Antipsychotics must be taken consistently as prescribed — symptom improvement is the result of the medication, not a sign to stop. Abrupt discontinuation risks relapse and mild abstinence syndrome. Antipsychotics must be taken on a regular schedule. <strong>E:</strong> Extra doses are dangerous — risk of hypotension, EPS, and CNS depression. Dosing is prescribed and individualized. <strong>G:</strong> PRN dosing is inappropriate — antipsychotics cannot maintain adequate plasma levels for disease management if taken only when symptoms worsen. <strong>A, C, D, F</strong> reflect accurate understanding.'},

// Q51 SATA
{type:'sata',stem:'The nurse conducts a routine assessment for a client who has been on haloperidol for 18 months. Which assessments should the nurse prioritize to monitor for <strong>long-term complications</strong> of antipsychotic therapy? <strong>Select all that apply.</strong>',choices:[{t:'Observe for tardive dyskinesia — including worm-like tongue movements, lip-smacking, and involuntary limb movements',c:true},{t:'Assess blood pressure in lying and standing positions for continued orthostatic hypotension',c:true},{t:'Monitor for signs of agranulocytosis — including fever, sore throat, and unusual fatigue',c:true},{t:'Assess sexual function — sexual dysfunction leading to poor adherence is a long-term concern',c:true},{t:'Monitor ECG and serum potassium to assess for QT prolongation and dysrhythmia risk',c:true},{t:'Reassess the need for antiparkinsonism drugs — neuroleptic-induced parkinsonism often resolves over time',c:true},{t:'Obtain a serum lithium level to assess for toxicity in all clients on long-term antipsychotic therapy',c:false}],rat:'<strong>Correct: A, B, C, D, E, F.</strong> Long-term antipsychotic monitoring: tardive dyskinesia — specifically a late-onset EPS requiring ongoing surveillance (A); orthostatic hypotension — ongoing risk (B); agranulocytosis — monitor for infection symptoms (C); sexual dysfunction — contributes significantly to nonadherence (D); QT prolongation — ECG and electrolytes especially potassium (E); EPS/parkinsonism reassessment — antiparkinsonism drugs should not continue indefinitely as neuroleptic-induced parkinsonism often resolves (F). <strong>G incorrect:</strong> Serum lithium levels are only relevant if the client is also receiving lithium — not a routine antipsychotic monitoring parameter.'},

// Q52 MATRIX
{type:'matrix',stem:'For each mood stabilizer, identify the correct <strong>pharmacological classification</strong>.',cols:['Mood stabilizer (primary class)','Antiepileptic drug / Mood stabilizer','Benzodiazepine / Mood stabilizer adjunct'],rows:[{t:'Lithium carbonate — prototype mood stabilizer; neuroprotective; mechanism unknown',ans:'Mood stabilizer (primary class)'},{t:'Divalproex sodium (Depakote)',ans:'Antiepileptic drug / Mood stabilizer'},{t:'Carbamazepine (Tegretol)',ans:'Antiepileptic drug / Mood stabilizer'},{t:'Lamotrigine (Lamictal) — stabilizes neuronal membranes by inhibiting sodium transport',ans:'Antiepileptic drug / Mood stabilizer'},{t:'Clonazepam (Klonopin)',ans:'Benzodiazepine / Mood stabilizer adjunct'}],rat:'<strong>Lithium → Primary mood stabilizer:</strong> Unknown mechanism — may inhibit intracellular proteins, stabilize calcium channels, decrease neuronal activity, modulate dopamine/glutamate/GABA. Neuroprotective. <strong>Divalproex, Carbamazepine, Lamotrigine → Antiepileptic/Mood stabilizer:</strong> All three are antiepileptic drugs repurposed for bipolar disorder. Divalproex and carbamazepine control acute mania and prevent relapse; lamotrigine is used for long-term maintenance. <strong>Clonazepam → Benzodiazepine adjunct:</strong> Used as adjunctive therapy in bipolar disorder for mania/insomnia/anxiety — not a primary mood stabilizer. Stimulates GABA receptors.'},

// Q53 MCQ
{type:'mcq',stem:'The nurse is caring for a client prescribed chlorpromazine (Thorazine). Which statement correctly identifies the dermatologic adverse effects specific to this drug\'s pharmacological class?',choices:[{t:'Chlorpromazine carries a risk of Stevens-Johnson syndrome (SJS) identical to ziprasidone due to its chemical structure',c:false},{t:'Chlorpromazine, as a phenothiazine, causes photosensitivity with sun exposure and contact dermatitis from direct handling of the oral concentrate',c:true},{t:'Dermatologic effects of chlorpromazine are caused by its alpha₁-adrenergic receptor blockade on skin blood vessels',c:false},{t:'Chlorpromazine causes a maculopapular rash that is expected and resolves without any intervention',c:false}],rat:'<strong>Correct: B.</strong> Phenothiazine-class antipsychotics (chlorpromazine = phenothiazine prototype) have class-specific dermatologic effects: photosensitivity with sun exposure AND contact dermatitis from direct skin contact with the oral concentrate — healthcare personnel and clients must avoid handling the liquid form. Clients should use sunscreen and protective clothing. <strong>A incorrect:</strong> SJS is associated specifically with ziprasidone, not phenothiazines. <strong>C incorrect:</strong> Alpha₁ blockade causes orthostatic hypotension — not skin effects. <strong>D incorrect:</strong> Contact dermatitis from phenothiazines is not expected/normal — it requires education to prevent.'},

// Q54 SATA
{type:'sata',stem:'The nurse compares clozapine (Clozaril) with haloperidol (Haldol) when planning care. Which statements accurately distinguish these two medications? <strong>Select all that apply.</strong>',choices:[{t:'Clozapine improves positive, negative, AND cognitive symptoms of schizophrenia, while haloperidol primarily improves positive symptoms',c:true},{t:'Clozapine requires REMS enrollment with mandatory WBC/ANC monitoring before dispensing; haloperidol does not',c:true},{t:'Clozapine carries significantly greater risk of metabolic syndrome compared to haloperidol',c:true},{t:'Both haloperidol and clozapine carry equal risk for causing extrapyramidal symptoms',c:false},{t:'Haloperidol carries greater EPS risk than clozapine due to its strong D2 receptor blockade',c:true},{t:'Clozapine is more clinically effective than haloperidol for treatment-resistant schizophrenia',c:true},{t:'Clozapine is the preferred first-line agent for newly diagnosed schizophrenia due to its superior efficacy',c:false}],rat:'<strong>Correct: A, B, C, E, F.</strong> <strong>A:</strong> FGAs (haloperidol) primarily improve positive symptoms; SGAs (clozapine) improve all three symptom domains. <strong>B:</strong> Clozapine\'s REMS requirement is unique. <strong>C:</strong> Clozapine and olanzapine carry the highest metabolic risk among all antipsychotics. <strong>E:</strong> FGAs have significant EPS risk; clozapine has low affinity for dopamine = fewer EPS. <strong>F:</strong> Clozapine is the most effective antipsychotic overall. <strong>D incorrect:</strong> Directly contradicted by E — EPS risk is NOT equal. <strong>G incorrect:</strong> Clozapine is reserved for treatment-resistant cases due to agranulocytosis risk — it is explicitly NOT first-line.'},

// Q55 SATA
{type:'sata',stem:'The nurse explains schizophrenia symptom categories to a client\'s family. Which statements accurately differentiate <strong>positive, negative, and cognitive symptoms</strong> of schizophrenia? <strong>Select all that apply.</strong>',choices:[{t:'Positive symptoms represent an exaggeration or distortion of normal function and include hallucinations, delusions, agitation, tension, and paranoia',c:true},{t:'Negative symptoms represent a loss or diminution of normal function and include lack of motivation, poverty of speech, blunted affect, poor self-care, and social withdrawal',c:true},{t:'Cognitive symptoms include disordered thinking, reduced ability to focus attention, and prominent learning and memory difficulties',c:true},{t:'First-generation antipsychotics (FGAs) effectively treat all three symptom categories equally well',c:false},{t:'Second-generation antipsychotics (SGAs) improve positive, negative, AND cognitive symptoms of schizophrenia',c:true},{t:'Negative symptoms frequently have the greatest impact on a client\'s ability to live independently and function in daily life',c:true}],rat:'<strong>Correct: A, B, C, E, F.</strong> Three symptom categories: <em>Positive</em> (exaggeration of normal function — hallucinations, delusions, agitation, tension, paranoia); <em>Negative</em> (loss of normal function — motivation, speech, affect, self-care, social engagement); <em>Cognitive</em> (disordered thinking, attention, memory). SGAs improve all three categories. <strong>D incorrect:</strong> FGAs primarily improve positive symptoms — they are significantly less effective for negative and cognitive symptoms compared to SGAs. <strong>F supported:</strong> Negative symptoms (poor self-care, lack of motivation, social withdrawal) often most profoundly affect quality of life, independence, and occupational functioning.'},

// Q56 SATA
{type:'sata',stem:'A client with bipolar I disorder is experiencing an acute manic episode. The provider considers adding an SGA to the treatment plan. Which statements accurately describe the use of SGAs in bipolar disorder? <strong>Select all that apply.</strong>',choices:[{t:'SGAs such as olanzapine, risperidone, aripiprazole, ziprasidone, and quetiapine can be used to acutely control symptoms during manic episodes',c:true},{t:'SGAs benefit clients with bipolar disorder both with and without psychotic symptoms',c:true},{t:'SGAs can be used alone or combined with a mood stabilizer for bipolar disorder management',c:true},{t:'SGAs are used only short-term for acute mania and cannot be used for long-term mood stabilization',c:false},{t:'SGAs used for bipolar disorder do not carry metabolic syndrome risk because the dose is lower than in schizophrenia',c:false},{t:'Long-term SGA therapy can contribute to sustained mood stabilization in bipolar disorder',c:true},{t:'Quetiapine is specifically approved for both acute manic AND depressive episodes in bipolar disorder',c:true}],rat:'<strong>Correct: A, B, C, F, G.</strong> SGAs in bipolar disorder: acutely control manic symptoms (A); benefit clients with or without psychotic features (B); can be combined with mood stabilizers (C); provide long-term mood stabilization (F); quetiapine specifically approved for both manic and depressive phases of bipolar (G). <strong>D incorrect:</strong> SGAs are used both short and long-term in bipolar disorder. <strong>E incorrect:</strong> Metabolic syndrome risk persists regardless of indication — clients on SGAs for bipolar disorder require the same metabolic monitoring as those with schizophrenia.'},

// Q57 MCQ
{type:'mcq',stem:'A client prescribed lithium carbonate tells the nurse, "My doctor wants me to eat heart-healthy, so I\'m planning to significantly reduce the amount of salt I eat." Which response by the nurse is most appropriate?',choices:[{t:'"That is a great idea — a low-sodium diet will help prevent lithium from accumulating to toxic levels."',c:false},{t:'"Reducing sodium intake while taking lithium can actually cause dangerous elevations in your lithium level and increase your risk of toxicity."',c:true},{t:'"Sodium intake does not significantly affect lithium levels — continue with your dietary plan."',c:false},{t:'"You should dramatically increase your sodium intake to offset the effects of lithium on the kidneys."',c:false}],rat:'<strong>Correct: B.</strong> Critical teaching point: sodium and lithium compete for renal reabsorption. When dietary sodium is low, the kidneys reabsorb MORE lithium to compensate for the sodium deficit — this increases serum lithium levels and risks toxicity. Course content explicitly states: "Do not reduce sodium intake." Also avoid dehydration (same mechanism). <strong>A is dangerous and incorrect.</strong> <strong>C is incorrect</strong> — sodium significantly affects lithium. <strong>D is an overstatement</strong> — maintain normal (not dramatically increased) sodium intake.'},

// Q58 SATA
{type:'sata',stem:'A client on antipsychotic therapy develops drug-induced parkinsonism. The nurse reviews treatment options. Which agents are listed in course content as appropriate treatment options for <strong>antipsychotic-induced parkinsonism</strong>? <strong>Select all that apply.</strong>',choices:[{t:'Benztropine mesylate (Cogentin)',c:true},{t:'Trihexyphenidyl (Artane)',c:true},{t:'Diphenhydramine (Benadryl)',c:true},{t:'Amantadine',c:true},{t:'Dantrolene (Dantrium)',c:false},{t:'Valbenazine',c:false},{t:'Bromocriptine',c:false}],rat:'<strong>Correct: A, B, C, D.</strong> Course content specifies treatment of drug-induced parkinsonism: "anticholinergics benztropine, trihexyphenidyl, diphenhydramine, or amantadine." These restore the dopamine/acetylcholine balance disrupted by antipsychotic D2 blockade. Antiparkinsonism drugs should not continue indefinitely — neuroleptic-induced parkinsonism often resolves; reassess after a few months. <strong>E incorrect:</strong> Dantrolene is used specifically for NMS (muscle relaxant). <strong>F incorrect:</strong> Valbenazine is used specifically for tardive dyskinesia. <strong>G incorrect:</strong> Bromocriptine is used specifically for NMS (dopamine receptor agonist to relieve CNS toxicity).'},

// Q59 MATRIX
{type:'matrix',stem:'For each therapeutic mechanism of action, identify the <strong>neurotransmitter system being targeted</strong> and match it to the drug class example from course content.',cols:['GABA (inhibitory)','Dopamine','Serotonin','Acetylcholine'],rows:[{t:'Benzodiazepines bind to receptor sites and potentiate this inhibitory neurotransmitter to reduce anxiety',ans:'GABA (inhibitory)'},{t:'First-generation antipsychotics block D2 receptors of this neurotransmitter to suppress positive symptoms of psychosis',ans:'Dopamine'},{t:'SSRIs block the reuptake of this neurotransmitter into the presynaptic neuron to treat depression',ans:'Serotonin'},{t:'Benztropine (Cogentin) blocks receptors for this neurotransmitter to restore balance in antipsychotic-induced parkinsonism',ans:'Acetylcholine'}],rat:'<strong>GABA → Benzodiazepines:</strong> GABA = major inhibitory neurotransmitter; too little GABA = anxiety. Benzodiazepines bind to GABA-A receptor complex making it more sensitive to GABA → potentiates inhibitory effect → decreases anxiety. <strong>Dopamine → FGAs:</strong> Excessive dopamine activity associated with schizophrenia and psychoses; FGAs block D2 receptors to suppress positive symptoms. <strong>Serotonin → SSRIs:</strong> Too little serotonin → depression; SSRIs block reuptake, increasing synaptic availability to treat depression. <strong>Acetylcholine → Benztropine:</strong> In drug-induced parkinsonism, dopamine blockade creates excess acetylcholine activity. Benztropine blocks muscarinic acetylcholine receptors to restore dopamine/acetylcholine balance.'},

// Q60 SATA
{type:'sata',stem:'The nurse explains to a client\'s family why clozapine was chosen over haloperidol for their family member\'s severe, treatment-resistant schizophrenia. Which statements accurately explain the <strong>clinical advantages of clozapine</strong>? <strong>Select all that apply.</strong>',choices:[{t:'Clozapine is more effective than any other currently available antipsychotic medication',c:true},{t:'Clozapine improves positive symptoms such as hallucinations, delusions, and agitation',c:true},{t:'Clozapine improves negative symptoms such as lack of motivation, poverty of speech, and social withdrawal',c:true},{t:'Clozapine improves cognitive symptoms including disordered thinking and reduced attention',c:true},{t:'Clozapine has fewer overall adverse effects than haloperidol, making it the appropriate first-line agent',c:false},{t:'Clozapine can be prescribed without ongoing WBC monitoring once stable therapeutic levels are achieved',c:false}],rat:'<strong>Correct: A, B, C, D.</strong> Clozapine clinical advantages: most effective antipsychotic overall (A); unlike FGAs (which primarily address positive symptoms), clozapine improves all three symptom domains — positive (B), negative (C), and cognitive (D). <strong>E incorrect:</strong> Clozapine has serious unique adverse effects excluding it from first-line use. <strong>F incorrect:</strong> Clozapine ALWAYS requires ongoing REMS WBC/ANC monitoring — it never stops.'},

// ── NEW QUESTIONS (Q61–Q80) ──────────────────────────────────────

// Q61 MCQ — FGA potency
{type:'mcq',stem:'The nurse is comparing haloperidol (Haldol) and chlorpromazine (Thorazine) for a client requiring FGA therapy. The nurse understands that chlorpromazine is considered a <strong>low-potency</strong> FGA while haloperidol is a <strong>high-potency</strong> FGA. Which statement most accurately describes the <strong>clinical significance</strong> of this potency difference?',choices:[{t:'Haloperidol produces greater antipsychotic benefit than chlorpromazine when administered at standard doses',c:false},{t:'Chlorpromazine produces more sedation, orthostatic hypotension, and anticholinergic effects, while haloperidol produces more extrapyramidal symptoms',c:true},{t:'The risk for tardive dyskinesia is higher with haloperidol than with chlorpromazine because of its higher potency',c:false},{t:'Chlorpromazine is preferred for initial therapy because it causes fewer side effects overall than haloperidol',c:false}],rat:'<strong>Correct: B.</strong> FGA potency classification predicts which side effects predominate, not which drug is more effective. <strong>High-potency FGAs (haloperidol):</strong> smaller dose needed; MORE EPS (dystonia, parkinsonism, akathisia), LESS sedation, LESS orthostatic hypotension, FEWER anticholinergic effects. <strong>Low-potency FGAs (chlorpromazine):</strong> larger dose needed; LESS EPS, MORE sedation, MORE orthostatic hypotension, MORE anticholinergic effects. <strong>A incorrect:</strong> Potency does NOT mean better efficacy — all FGAs are equivalent in antipsychotic effect when given in therapeutically equivalent doses. "High potency" means a smaller dose achieves the same effect. <strong>C incorrect:</strong> Tardive dyskinesia risk is EQUAL for ALL FGAs regardless of potency — this is a critical exam point. <strong>D incorrect:</strong> Chlorpromazine\'s lower EPS comes at the cost of more sedation and hypotension — it is not simply "fewer side effects overall."'},

// Q62 MCQ — antipsychotic treatment timeline / not curative
{type:'mcq',stem:'A client newly started on an antipsychotic asks the nurse, "How soon will this medication start working?" The nurse provides accurate teaching. Additionally, the nurse includes which important statement about the long-term nature of antipsychotic therapy?',choices:[{t:'"You should feel completely cured within 1–2 weeks, after which you may taper the medication."',c:false},{t:'"Initial effects may appear in 1–2 days, with significant improvement in 1–2 weeks, but full effects may take several months — and this medication treats symptoms but does not cure schizophrenia."',c:true},{t:'"This medication will not produce any noticeable change for at least 3 months — give it time before evaluating whether it is working."',c:false},{t:'"Once the medication takes full effect in 1–2 weeks, you can stop taking it as long as your symptoms have resolved."',c:false}],rat:'<strong>Correct: B.</strong> Antipsychotic therapy timeline per course content: initial effects may appear in 1–2 days; significant improvement typically in 1–2 weeks; full effects may not develop for several months. Critically: antipsychotics do NOT alter the underlying pathology of schizophrenia — they provide symptomatic relief only and are NOT curative. Patients who feel "cured" must be strongly encouraged to continue therapy. <strong>A incorrect:</strong> There is no "cure" — stopping medication risks relapse. <strong>C incorrect:</strong> 3 months with no observable change is too long — initial effects appear within days. <strong>D incorrect:</strong> Antipsychotics must be continued long-term; symptom resolution on medication does not mean the disease is cured.'},

// Q63 MCQ — akathisia misidentification
{type:'mcq',stem:'A client on haloperidol (Haldol) has been pacing the unit for hours, states they feel an internal, uncontrollable drive to keep moving, and becomes increasingly distressed when asked to sit. The nurse suspects akathisia. Which response by the nurse demonstrates the <strong>most important clinical insight</strong> about misidentifying this presentation?',choices:[{t:'If akathisia is mistaken for psychotic agitation and the antipsychotic dose is increased, the akathisia will worsen significantly',c:true},{t:'If akathisia is mistaken for psychotic agitation, the most appropriate intervention would be to administer diphenhydramine IM',c:false},{t:'Akathisia and psychotic agitation share the same treatment, so misidentification has minimal clinical impact',c:false},{t:'If akathisia is mistaken for anxiety, the appropriate response is to add a second antipsychotic to the regimen',c:false}],rat:'<strong>Correct: A.</strong> This is a critical safety concept from the study guide: akathisia is frequently mistaken for psychotic agitation or anxiety. If the nurse or provider incorrectly concludes the client is experiencing a worsening psychotic episode and increases the antipsychotic dose → the higher dose causes MORE dopamine D2 blockade → akathisia WORSENS significantly. Recognition of akathisia is essential because the appropriate intervention (beta-blocker, benzodiazepine, anticholinergic, or switching to a low-potency FGA) is the opposite of increasing the antipsychotic. Assessment tip: ask the client whether they feel an internal drive to keep moving that they cannot voluntarily control — this distinguishes akathisia from external agitation. <strong>B incorrect:</strong> Diphenhydramine IM/IV treats acute dystonia and parkinsonism, not akathisia. <strong>C incorrect:</strong> The treatments are completely different — this misidentification has significant consequences. <strong>D incorrect:</strong> Adding a second antipsychotic compounds the D2 blockade and worsens akathisia.'},

// Q64 MCQ — clozapine myocarditis
{type:'mcq',stem:'A client recently started on clozapine (Clozaril) presents to the clinic with unexplained fatigue, new-onset shortness of breath, tachypnea, chest pain, and palpitations. The nurse recognizes this symptom cluster and takes which <strong>priority action</strong>?',choices:[{t:'Reassure the client that fatigue and mild chest discomfort are expected anticholinergic effects during the first weeks of clozapine therapy',c:false},{t:'Immediately hold clozapine, notify the provider, and ensure evaluation for myocarditis before the medication is continued',c:true},{t:'Obtain orthostatic blood pressure measurements and have the client lie flat — this presentation is consistent with orthostatic hypotension',c:false},{t:'Administer a stat dose of dantrolene and prepare for ICU-level care for suspected neuroleptic malignant syndrome',c:false}],rat:'<strong>Correct: B.</strong> Clozapine is associated with a rare but potentially fatal complication — myocarditis (heart muscle inflammation). Signs include: unexplained fatigue, dyspnea (shortness of breath), tachypnea, chest pain, and palpitations. Clozapine must be withheld immediately until myocarditis is ruled out. If myocarditis is confirmed, the medication must be PERMANENTLY discontinued — the client must NOT be rechallenged with clozapine. This is separate from the agranulocytosis risk and REMS monitoring. <strong>A incorrect:</strong> These are NOT expected anticholinergic effects — fatigue + dyspnea + chest pain in a clozapine patient signals a cardiac emergency. <strong>C incorrect:</strong> Orthostatic hypotension does not explain chest pain and tachypnea — this presentation is more serious. <strong>D incorrect:</strong> NMS presents with fever + lead-pipe rigidity + altered consciousness — not dyspnea and chest pain. Dantrolene is not appropriate here.'},

// Q65 MCQ — aripiprazole partial agonist
{type:'mcq',stem:'The nurse educates a nursing student about aripiprazole (Abilify) and how its mechanism of action differs from other antipsychotics. Which statement most accurately describes aripiprazole\'s <strong>unique pharmacological mechanism</strong>?',choices:[{t:'Aripiprazole is a full dopamine D2 antagonist that blocks all dopamine activity more completely than other SGAs',c:false},{t:'Aripiprazole is a dopamine system stabilizer — a partial D2 agonist that acts as an antagonist when dopamine is excessive and as an agonist when dopamine is insufficient',c:true},{t:'Aripiprazole works exclusively by blocking serotonin receptors without any effect on the dopamine system',c:false},{t:'Aripiprazole blocks histamine and acetylcholine receptors primarily, producing its antipsychotic effects through sedation and anticholinergic activity',c:false}],rat:'<strong>Correct: B.</strong> Aripiprazole is classified as a <strong>dopamine system stabilizer</strong> due to its unique partial D2 agonist mechanism. This means it has two-directional activity: when dopamine activity is excessive (as in psychosis/mania), aripiprazole acts as a <strong>functional antagonist</strong> to reduce dopamine activity; when dopamine activity is insufficient (as in depression), it acts as an <strong>agonist</strong> to enhance activity. This stabilizing mechanism explains why aripiprazole has the lowest EPS risk among SGAs AND has the lowest metabolic risk (tied with ziprasidone). <strong>A incorrect:</strong> Full antagonism describes FGAs — aripiprazole is a partial agonist, not a full antagonist. <strong>C incorrect:</strong> Aripiprazole does affect the dopamine system — it is a dopamine system stabilizer. It does also block serotonin, but this is not its defining unique mechanism. <strong>D incorrect:</strong> Histamine and ACh blockade cause sedation and anticholinergic effects, not the primary antipsychotic mechanism.'},

// Q66 SATA — tuberoinfundibular pathway / prolactin effects
{type:'sata',stem:'A client on long-term haloperidol therapy reports new-onset breast tenderness, and upon assessment the nurse notes galactorrhea. The client\'s male partner also reports gynecomastia since starting antipsychotic therapy 3 months ago. The nurse recognizes these findings as related to which underlying mechanism? The nurse should also include which assessments in the follow-up care plan? <strong>Select all that apply.</strong>',choices:[{t:'These findings result from dopamine D2 blockade in the tuberoinfundibular pathway, causing elevated prolactin levels',c:true},{t:'Dopamine normally inhibits prolactin secretion from the pituitary gland; blocking D2 removes this inhibition, causing prolactin to rise',c:true},{t:'Assess the female client for menstrual irregularities, as hyperprolactinemia can cause amenorrhea or irregular menses',c:true},{t:'These symptoms reflect a systemic allergic reaction to the antipsychotic medication and require immediate drug discontinuation',c:false},{t:'Gynecomastia and galactorrhea are more commonly associated with FGAs than SGAs due to stronger D2 blockade',c:true},{t:'Reassure the client that galactorrhea is an expected anticholinergic effect that requires no further evaluation',c:false}],rat:'<strong>Correct: A, B, C, E.</strong> The tuberoinfundibular pathway is the third D2 receptor pathway affected by antipsychotics. Dopamine normally inhibits prolactin release from the anterior pituitary. When FGAs block D2 receptors in this pathway, the inhibitory brake on prolactin is removed → hyperprolactinemia → galactorrhea (inappropriate milk production in males and females), gynecomastia (breast tissue enlargement), sexual dysfunction, and menstrual irregularities (amenorrhea). FGAs cause more pronounced prolactin elevation than SGAs because of their stronger D2 blockade. <strong>D incorrect:</strong> This is not an allergic reaction — it is a predictable pharmacological consequence of D2 blockade in the tuberoinfundibular pathway. <strong>F incorrect:</strong> Galactorrhea is a neuroendocrine effect (prolactin elevation), NOT an anticholinergic effect. Dismissing it without evaluation is inappropriate; it may warrant dose adjustment or medication change.'},

// Q67 SATA — D2 pathway specificity
{type:'sata',stem:'The nursing instructor asks students to identify which <strong>dopamine D2 receptor pathway</strong> is responsible for each clinical outcome associated with antipsychotic therapy. Which pairings are accurate? <strong>Select all that apply.</strong>',choices:[{t:'Blockade of D2 receptors in the <em>mesolimbic pathway</em> produces the therapeutic antipsychotic effect — suppressing positive symptoms such as hallucinations and delusions',c:true},{t:'Blockade of D2 receptors in the <em>nigrostriatal pathway</em> produces extrapyramidal symptoms (EPS) because this pathway controls motor coordination',c:true},{t:'Blockade of D2 receptors in the <em>tuberoinfundibular pathway</em> causes elevated prolactin levels leading to gynecomastia and galactorrhea',c:true},{t:'Blockade of D2 receptors in the <em>mesocortical pathway</em> produces the primary antipsychotic benefit by suppressing negative symptoms',c:false},{t:'The mesolimbic and nigrostriatal pathways are distinct — this explains why antipsychotics can suppress psychosis (via mesolimbic) while simultaneously causing EPS (via nigrostriatal)',c:true}],rat:'<strong>Correct: A, B, C, E.</strong> Three key D2 pathways: (1) <strong>Mesolimbic pathway</strong> → blocking D2 here is the therapeutic target; reduces excess dopamine activity responsible for positive symptoms (hallucinations, delusions, agitation). (2) <strong>Nigrostriatal pathway</strong> → blocking D2 here is the source of EPS; this is the same pathway disrupted in Parkinson\'s disease, which is why drug-induced EPS resembles PD. (3) <strong>Tuberoinfundibular pathway</strong> → blocking D2 here removes dopamine\'s normal inhibition of prolactin secretion from the pituitary → hyperprolactinemia → gynecomastia, galactorrhea, sexual dysfunction, menstrual irregularities. The mesolimbic and nigrostriatal pathways are spatially distinct, but current FGAs block D2 receptors throughout the brain — they cannot selectively target only the mesolimbic system, which is why EPS inevitably accompanies FGA therapy. <strong>D incorrect:</strong> The mesocortical pathway is associated with negative and cognitive symptoms, but blocking D2 there may worsen these symptoms — this is NOT the primary therapeutic target and is not listed in course content as a mechanism of benefit.'},

// Q68 SATA — EPS exact timing windows
{type:'sata',stem:'The nurse is educating a client who was started on haloperidol 3 days ago. The client now presents with severe, painful, involuntary neck twisting, and one eye is deviated upward (oculogyric crisis). The nurse identifies this as acute dystonia. Which statements accurately describe <strong>acute dystonia and its clinical context</strong>? <strong>Select all that apply.</strong>',choices:[{t:'Acute dystonia typically develops within the first hours to 5 days of antipsychotic therapy',c:true},{t:'Acute dystonia can involve laryngeal spasm, which may compromise the airway and requires immediate assessment of respiratory status',c:true},{t:'Oculogyric crisis (involuntary upward eye deviation) is a recognized manifestation of acute dystonia',c:true},{t:'Acute dystonia can be mistaken for psychotic hysteria — if misidentified and the antipsychotic dose is increased, the dystonia will worsen',c:true},{t:'IV benztropine resolves acute dystonia within 5 minutes; IM benztropine resolves symptoms within 15–20 minutes',c:true},{t:'Acute dystonia most commonly occurs late in therapy, after months of antipsychotic use',c:false}],rat:'<strong>Correct: A, B, C, D, E.</strong> Acute dystonia onset: first hours to 5 days of therapy — the earliest EPS type. Manifestations include involuntary muscle contractions, twisting, neck stiffness, oculogyric crisis (eyes deviate upward involuntarily), opisthotonus (back arches, head and limbs thrust back), and potentially <strong>laryngeal dystonia</strong> — which is a nursing emergency as it can obstruct the airway. Treatment: anticholinergic (benztropine or diphenhydramine) IM or IV; IV resolves in ~5 min, IM in 15–20 min. Critical safety point: acute dystonia is frequently mistaken for psychotic hysteria → clinician increases antipsychotic dose → worsens dystonia. Always consider EPS when a client on antipsychotics develops sudden muscle spasms or eye deviations. <strong>F incorrect:</strong> Late onset (months to years) describes tardive dyskinesia, not acute dystonia. Acute dystonia is by definition an early EPS.'},

// Q69 SATA — drug-induced parkinsonism nuance (levodopa contraindicated)
{type:'sata',stem:'A client on chlorpromazine develops drug-induced parkinsonism 2 weeks after starting therapy. The care team discusses treatment options. Which statements about managing <strong>drug-induced parkinsonism</strong> are accurate? <strong>Select all that apply.</strong>',choices:[{t:'Levodopa and dopamine receptor agonists should NOT be used to treat drug-induced parkinsonism, as they would activate dopamine receptors and counteract the antipsychotic benefit',c:true},{t:'Drug-induced parkinsonism and idiopathic Parkinson\'s disease are clinically indistinguishable — the key differentiating factor is whether symptoms began after antipsychotic initiation',c:true},{t:'Drug-induced parkinsonism tends to resolve spontaneously over months, and antiparkinsonism drugs should be tapered after a few months to reassess continued need',c:true},{t:'Switching to an SGA is an appropriate strategy because SGAs have lower EPS risk due to moderate D2 blockade',c:true},{t:'Drug-induced parkinsonism is a permanent condition that will not resolve even if the antipsychotic is discontinued',c:false},{t:'Amantadine and anticholinergic agents are both appropriate treatment options for drug-induced parkinsonism',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> Drug-induced parkinsonism management: do NOT use levodopa or dopamine agonists — they oppose the antipsychotic\'s D2 blockade and reduce antipsychotic efficacy (A). Drug-induced PD looks identical to idiopathic PD — differentiate by timeline (B). Unlike idiopathic PD, drug-induced parkinsonism often resolves spontaneously within months; antiparkinsonism drugs (benztropine, amantadine) should be tapered and reassessed periodically (C). Switching to an SGA reduces EPS risk due to moderate (not strong) D2 blockade (D). Appropriate treatments include anticholinergics (benztropine, trihexyphenidyl, diphenhydramine) AND amantadine (F). <strong>E incorrect:</strong> Drug-induced parkinsonism is NOT permanent — it frequently resolves spontaneously when the antipsychotic is discontinued or switched, unlike idiopathic PD.'},

// Q70 SATA — NMS 5-20% mortality, high-potency, 2-week wait
{type:'sata',stem:'The nurse participates in a debriefing following a client who experienced neuroleptic malignant syndrome (NMS) while on haloperidol. Which statements accurately reflect the <strong>evidence-based facts about NMS</strong> that the nurse should share? <strong>Select all that apply.</strong>',choices:[{t:'NMS carries a mortality rate of approximately 5–20% even with treatment',c:true},{t:'Temperature can exceed 41°C (105.8°F) in severe NMS',c:true},{t:'NMS occurs more frequently with high-potency FGAs such as haloperidol than with low-potency agents',c:true},{t:'If the antipsychotic must be restarted after NMS has resolved, the provider should wait at least 2 weeks before reinitiating therapy',c:true},{t:'When restarting after NMS, the provider should use the highest possible dose to quickly re-establish therapeutic levels and prevent psychiatric relapse',c:false},{t:'NMS can occur at any point during antipsychotic therapy, but is more likely to occur during periods of dose escalation',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> NMS facts from study guide: 5–20% mortality rate (A); temperature can exceed 41°C (B); more likely with high-potency FGAs like haloperidol (C) due to their stronger D2 blockade; if antipsychotic must be restarted after recovery, wait at least 2 weeks (D) to allow receptor sensitivity to normalize; NMS can occur at any time but is more likely with dose escalation (F). <strong>E incorrect — dangerous distractor:</strong> When restarting after NMS, the provider should use the LOWEST effective dose and AVOID high-potency agents — NOT the highest dose. Using the highest dose with no waiting period risks NMS recurrence, which carries even higher mortality on rechallenge.'},

// Q71 SATA — TD: AIMS, deutetrabenazine, TD is often irreversible
{type:'sata',stem:'A client with a 10-year history of antipsychotic therapy is being assessed for tardive dyskinesia using the Abnormal Involuntary Movement Scale (AIMS). The nurse understands which statements to be accurate regarding <strong>tardive dyskinesia monitoring and management</strong>? <strong>Select all that apply.</strong>',choices:[{t:'The AIMS (Abnormal Involuntary Movement Scale) is the standardized tool used to monitor for tardive dyskinesia in clients on long-term antipsychotic therapy',c:true},{t:'Early signs of tardive dyskinesia include subtle, fine, worm-like tongue movements and facial grimacing — detection at this stage allows intervention before symptoms become irreversible',c:true},{t:'Two FDA-approved medications for tardive dyskinesia are valbenazine (Ingrezza) and deutetrabenazine (Austedo) — both are VMAT2 inhibitors that reduce symptoms but do not fully eliminate TD',c:true},{t:'Tardive dyskinesia is always fully reversible if the antipsychotic is discontinued promptly upon detection',c:false},{t:'Tardive dyskinesia develops in approximately 5.5% of patients on long-term FGA therapy and risk increases with dose and duration of treatment',c:true},{t:'Switching from an FGA to an SGA is an appropriate strategy to reduce ongoing TD progression because SGAs produce less D2 blockade',c:true}],rat:'<strong>Correct: A, B, C, E, F.</strong> TD monitoring and management: AIMS scale used at every visit for long-term antipsychotic clients (A); early subtle tongue movements are the first sign — early detection allows intervention before irreversibility (B); valbenazine AND deutetrabenazine (both VMAT2 inhibitors) are FDA-approved for TD — they reduce but do not eliminate symptoms (C); TD affects ~5.5% on long-term FGA therapy, risk increasing with dose and duration (E); switching to SGA reduces ongoing D2 blockade and may slow TD progression (F). <strong>D incorrect:</strong> TD is often irreversible — for many patients, symptoms persist even after the drug is discontinued. This is why prevention through lowest effective dose and early detection is the priority. The VMAT2 inhibitors can reduce symptoms but do not guarantee reversal.'},

// Q72 SATA — clozapine REMS specific thresholds
{type:'sata',stem:'The nurse is caring for a client on clozapine (Clozaril) whose WBC has been trending downward over 3 weeks. Today\'s result is WBC 2,700/mm³ and ANC 1,300/mm³. Which actions reflect accurate application of the <strong>clozapine REMS monitoring thresholds</strong>? <strong>Select all that apply.</strong>',choices:[{t:'A WBC of 2,700/mm³ is below the 3,000/mm³ threshold — clozapine should be interrupted (held) and the provider notified immediately',c:true},{t:'An ANC of 1,300/mm³ is below the 1,500/mm³ threshold — this also requires interruption of clozapine therapy',c:true},{t:'Before initiating clozapine, a client must have a baseline WBC ≥3,500/mm³ AND ANC ≥2,000/mm³',c:true},{t:'If the WBC drops below 2,000/mm³ or ANC below 1,000/mm³, clozapine must be permanently discontinued with no possibility of future rechallenge',c:true},{t:'Because this is the client\'s first low WBC result, the nurse should continue administering clozapine and recheck labs in 1 week',c:false},{t:'The nurse should teach the client that signs of infection — fever, sore throat, and unusual fatigue — must be reported immediately as these may signal agranulocytosis',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> Clozapine REMS WBC/ANC thresholds: <strong>Baseline to start:</strong> WBC ≥3,500/mm³ AND ANC ≥2,000/mm³. <strong>Interrupt (hold) treatment:</strong> WBC <3,000/mm³ OR ANC <1,500/mm³ — this client\'s values (WBC 2,700, ANC 1,300) meet BOTH interrupt criteria (A, B). <strong>Permanently discontinue:</strong> WBC <2,000/mm³ OR ANC <1,000/mm³ — no future rechallenge allowed (D). <strong>Monitoring schedule:</strong> weekly for first 6 months → biweekly months 6–12 → monthly thereafter. Client teaching: report all infection signs immediately (F). <strong>E incorrect — patient safety risk:</strong> Continuing clozapine despite WBC and ANC values below interrupt thresholds puts the client at serious risk of life-threatening agranulocytosis. Waiting 1 week without action violates REMS protocol.'},

// Q73 SATA — non-adherence #1 cause of relapse / barriers
{type:'sata',stem:'The nurse discusses strategies for improving antipsychotic medication adherence with the treatment team for a client with schizophrenia who has had three hospitalizations in the past year due to medication non-adherence. Which statements about <strong>non-adherence and adherence strategies</strong> are accurate? <strong>Select all that apply.</strong>',choices:[{t:'Non-adherence to antipsychotic therapy is the number one underlying cause of relapse and rehospitalization in schizophrenia',c:true},{t:'Anosognosia — a neurologically based lack of insight in which the client genuinely does not believe they are ill — is a common, neurologically based barrier to adherence in schizophrenia',c:true},{t:'Clients may "cheek" oral medications (hide the tablet in the cheek rather than swallowing) — nursing staff should check the mouth after administration to confirm swallowing',c:true},{t:'If a client refuses to take oral antipsychotics due to non-adherence, depot (long-acting injectable) formulations should be considered to improve medication delivery',c:true},{t:'If a client does not believe they are mentally ill, the nurse should focus education primarily on the antipsychotic\'s side effects, as this is the most common reason for non-adherence',c:false},{t:'Involving family members in medication oversight for outpatients is a recognized adherence-promotion strategy',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> Non-adherence is the #1 cause of relapse (A). Key barriers: anosognosia (neurologic lack of insight — cannot simply be educated away — B); side effects (especially sexual dysfunction and weight gain); cost; stigma; feeling "cured." Nursing strategies: monitor for cheeking of oral formulations (C); use depot for chronic non-adherence (D); involve family in outpatient medication oversight (F); build a therapeutic relationship; explore barriers non-judgmentally; address side effects proactively. <strong>E incorrect:</strong> Anosognosia — the belief that one is not ill — is actually considered the most significant cause of non-adherence in schizophrenia (not side effects, though side effects are also important). Education focused only on side effects misses the primary barrier for many clients. A comprehensive, individualized approach addressing multiple barriers is required.'},

// Q74 SATA — depot advantages
{type:'sata',stem:'The nurse explains to a client and their family why the provider is recommending a transition to a depot (long-acting injectable) antipsychotic preparation. Which statements about the <strong>advantages of depot antipsychotic therapy</strong> are accurate? <strong>Select all that apply.</strong>',choices:[{t:'Depot preparations produce a lower relapse rate compared to oral antipsychotic therapy',c:true},{t:'Depot preparations produce more stable plasma drug concentrations between doses because they eliminate the peaks and troughs associated with daily oral dosing',c:true},{t:'Because the total dose administered per unit time is lower with depot formulations, the risk for tardive dyskinesia may be reduced compared to oral dosing',c:true},{t:'Depot preparations have been shown in studies to carry a significantly higher risk of side effects than oral formulations',c:false},{t:'Depot formulations eliminate the need for medication monitoring and follow-up clinical visits after the injection schedule is established',c:false},{t:'Depot therapy is valuable not only for clients with known adherence problems, but is beneficial for all clients requiring long-term antipsychotic maintenance',c:true}],rat:'<strong>Correct: A, B, C, F.</strong> Three evidence-based advantages of depot therapy from the textbook: (1) lower relapse rate than oral therapy — the most clinically important advantage (A); (2) more stable plasma drug levels — eliminates the peaks (potential toxicity) and troughs (potential breakthrough symptoms) of daily oral dosing (B); (3) lower total dose per unit time → potentially reduced TD risk (C). Depot therapy is beneficial for ALL clients on long-term maintenance, not only those with known non-adherence (F). <strong>D incorrect:</strong> Course content explicitly states "no evidence that depot preparations pose an increased risk of side effects" — depot safety profile is equivalent to oral. <strong>E incorrect:</strong> Ongoing clinical monitoring is still required even on depot therapy — for EPS, metabolic effects, NMS, and to assess therapeutic response and adjust dosing intervals.'},

// Q75 SATA — drug selection framework (individualization)
{type:'sata',stem:'The nurse participates in a multidisciplinary team meeting to discuss antipsychotic drug selection for several clients. Which statements accurately reflect the <strong>individualized drug selection framework</strong> for antipsychotic therapy? <strong>Select all that apply.</strong>',choices:[{t:'A client with pre-existing type 2 diabetes and dyslipidemia would be a candidate for an FGA or for aripiprazole/ziprasidone (the SGAs with lowest metabolic risk) to minimize worsening of metabolic parameters',c:true},{t:'A client who experienced severe EPS while on haloperidol (FGA) would be an appropriate candidate for switching to an SGA due to their lower EPS risk',c:true},{t:'A client who has failed two adequate antipsychotic trials is a candidate for a clozapine trial despite its serious adverse effect profile',c:true},{t:'When there is no specific clinical reason to choose an SGA over an FGA, cost considerations favor choosing an FGA because they cost significantly less than SGAs',c:true},{t:'SGAs should always be chosen over FGAs because government research studies have confirmed that SGAs produce superior antipsychotic outcomes',c:false},{t:'A client requiring long-term maintenance therapy with a history of chronic non-adherence would benefit from transitioning to a depot antipsychotic formulation regardless of whether an FGA or SGA is selected',c:true}],rat:'<strong>Correct: A, B, C, D, F.</strong> Evidence-based drug selection: diabetes/dyslipidemia → FGA or low-metabolic-risk SGAs (aripiprazole/ziprasidone) preferred (A); severe EPS on FGA → switch to SGA (B); treatment-resistant (failed ≥2 drugs) → clozapine (C); no clinical distinction between classes → FGAs cost 10–20× less (D); chronic non-adherence → depot formulation (F). <strong>E incorrect — critical distractor:</strong> Two large government-funded studies (CATIE and CUtLASS) showed that FGAs and SGAs are EQUALLY effective. SGAs did NOT prove superior in antipsychotic outcomes — they simply exchanged EPS risk for metabolic risk. This finding was a major shift from the original belief that SGAs were globally superior. Clozapine remains the exception as the only antipsychotic proven more effective than others.'},

// Q76 MATRIX — D2 pathway to clinical outcome
{type:'matrix',stem:'For each <strong>clinical outcome</strong>, identify which dopamine D2 receptor pathway blockade is responsible.',cols:['Mesolimbic pathway','Nigrostriatal pathway','Tuberoinfundibular pathway'],rows:[{t:'Suppression of hallucinations, delusions, agitation, and paranoia — the primary therapeutic antipsychotic effect',ans:'Mesolimbic pathway'},{t:'Development of bradykinesia, cogwheel rigidity, shuffling gait, and mask-like face — drug-induced parkinsonism',ans:'Nigrostriatal pathway'},{t:'Elevation of prolactin levels leading to gynecomastia, galactorrhea, sexual dysfunction, and menstrual irregularities',ans:'Tuberoinfundibular pathway'},{t:'Acute dystonia — involuntary twisting, muscular contractions, and rhythmic jerks early in therapy',ans:'Nigrostriatal pathway'}],rat:'<strong>Mesolimbic → Therapeutic (antipsychotic) effect:</strong> The mesolimbic pathway regulates emotion, reward, and cognition. Excessive dopamine activity here produces positive symptoms (hallucinations, delusions, agitation). D2 blockade in this pathway is the primary mechanism of antipsychotic benefit. <strong>Nigrostriatal → EPS (both parkinsonism AND dystonia):</strong> The nigrostriatal pathway controls motor coordination — the same pathway affected in Parkinson\'s disease. D2 blockade here produces all EPS types: acute dystonia, drug-induced parkinsonism, akathisia, and tardive dyskinesia. <strong>Tuberoinfundibular → Prolactin elevation:</strong> Dopamine normally inhibits prolactin secretion from the anterior pituitary via this pathway. D2 blockade removes this inhibitory control → hyperprolactinemia → gynecomastia, galactorrhea, menstrual irregularities, sexual dysfunction. All four manifestations stem from the same tuberoinfundibular D2 blockade.'},

// Q77 MATRIX — EPS exact timing and condition confused with
{type:'matrix',stem:'For each EPS type, identify which condition it is most commonly <strong>confused with clinically</strong>, based on the study guide\'s "confuser" table.',cols:['Psychotic hysteria','Idiopathic Parkinson\'s disease','Psychotic agitation or anxiety','Tourette-like tics'],rows:[{t:'Acute dystonia — sudden involuntary muscle spasms, twisting, oculogyric crisis',ans:'Psychotic hysteria'},{t:'Drug-induced parkinsonism — bradykinesia, tremor, cogwheel rigidity, shuffling gait',ans:'Idiopathic Parkinson\'s disease'},{t:'Akathisia — pacing, squirming, uncontrollable inner urge to stay in motion',ans:'Psychotic agitation or anxiety'},{t:'Tardive dyskinesia — choreiform tongue/face movements, lip-smacking, involuntary limb movements',ans:'Tourette-like tics'}],rat:'<strong>Acute dystonia → Psychotic hysteria:</strong> Sudden muscle spasms and bizarre posturing can look dramatic and be dismissed as hysteria. If misidentified and the antipsychotic is increased, dystonia worsens significantly. <strong>Drug-induced parkinsonism → Idiopathic PD:</strong> Clinically indistinguishable — bradykinesia, tremor, rigidity, shuffling gait. Key differentiator: onset after antipsychotic initiation vs. idiopathic onset. Do NOT treat drug-induced PD with levodopa (counteracts antipsychotic). <strong>Akathisia → Psychotic agitation:</strong> Motor restlessness from akathisia appears identical to agitation from psychosis. Misidentification → increased antipsychotic dose → worsens akathisia. Ask the client about an internal drive to move. <strong>TD → Tourette-like tics:</strong> Choreoathetoid facial movements, tongue protrusions, and limb movements can resemble tics. Distinguished by history of long-term antipsychotic use and typical presentation pattern.'},

// Q78 MATRIX — SGA metabolic risk ranking
{type:'matrix',stem:'For each SGA, identify its relative <strong>metabolic syndrome risk level</strong> based on course and study guide content.',cols:['Highest metabolic risk','Moderate metabolic risk','Lowest metabolic risk (among SGAs)'],rows:[{t:'Clozapine (Clozaril)',ans:'Highest metabolic risk'},{t:'Olanzapine (Zyprexa)',ans:'Highest metabolic risk'},{t:'Risperidone (Risperdal)',ans:'Moderate metabolic risk'},{t:'Aripiprazole (Abilify)',ans:'Lowest metabolic risk (among SGAs)'},{t:'Ziprasidone (Geodon)',ans:'Lowest metabolic risk (among SGAs)'}],rat:'<strong>Highest risk — Clozapine &amp; Olanzapine:</strong> These two SGAs carry the greatest metabolic risk — weight gain, new-onset diabetes, dyslipidemia. Clozapine and olanzapine should be used with particular caution in clients with pre-existing metabolic conditions. Regular metabolic monitoring (weight, waist circumference, fasting glucose, lipid panel) is essential. <strong>Moderate risk — Risperidone (and quetiapine, not listed here):</strong> Significant but intermediate metabolic risk; still requires metabolic monitoring. <strong>Lowest risk — Aripiprazole &amp; Ziprasidone:</strong> These two SGAs have the lowest metabolic syndrome risk among the SGAs, making them preferred options when a client has pre-existing diabetes, dyslipidemia, or weight concerns. Aripiprazole\'s partial D2 agonist mechanism and ziprasidone\'s receptor profile both contribute to their relatively favorable metabolic profiles.'},

// Q79 MATRIX — quetiapine and ziprasidone unique clinical details
{type:'matrix',stem:'For each SGA, identify the <strong>unique clinical consideration or monitoring requirement</strong> that specifically distinguishes it from other SGAs based on study guide content.',cols:['Contraindicated in QT risk factors (hypokalemia, history of dysrhythmias, long QT syndrome)','Monitor for lens changes (cataracts) with long-term use','Requires 3-hour post-injection observation due to PDSS risk','Permanently discontinue if myocarditis is confirmed — no rechallenge'],rows:[{t:'Ziprasidone (Geodon)',ans:'Contraindicated in QT risk factors (hypokalemia, history of dysrhythmias, long QT syndrome)'},{t:'Quetiapine (Seroquel) — long-term therapy',ans:'Monitor for lens changes (cataracts) with long-term use'},{t:'Olanzapine pamoate (Zyprexa Relprevv depot)',ans:'Requires 3-hour post-injection observation due to PDSS risk'},{t:'Clozapine (Clozaril)',ans:'Permanently discontinue if myocarditis is confirmed — no rechallenge'}],rat:'<strong>Ziprasidone → QT contraindication:</strong> Although all SGAs can prolong the QT interval, ziprasidone has a specific contraindication in clients with known QT risk factors — hypokalemia, history of dysrhythmias, or congenital long QT syndrome. Lowest metabolic risk but highest cardiac caution. <strong>Quetiapine → Cataract monitoring:</strong> Long-term quetiapine use is associated with lens changes. The study guide notes that clinicians should check the lens for cataracts with long-term use — an exam-testable distinguishing feature. <strong>Olanzapine pamoate depot → PDSS:</strong> Zyprexa Relprevv carries a risk of post-injection delirium sedation syndrome (PDSS) — clients must be observed by healthcare personnel for at least 3 hours after each injection before being allowed to leave. <strong>Clozapine → No rechallenge after myocarditis:</strong> If clozapine-associated myocarditis is confirmed, the medication must be permanently discontinued and the client must NOT be rechallenged. Fatigue + dyspnea + chest pain + palpitations = withhold and evaluate immediately.'},

// Q80 SATA — antipsychotics not curative + comprehensive treatment
{type:'sata',stem:'The nurse provides comprehensive discharge education to a client with schizophrenia who reports feeling "completely cured" after 3 weeks on antipsychotic therapy and plans to stop the medication. Which statements should the nurse include in the teaching? <strong>Select all that apply.</strong>',choices:[{t:'"Your improvement in symptoms is the result of the medication working — antipsychotics treat the symptoms of schizophrenia but do not cure the underlying disease."',c:true},{t:'"If you stop the medication now, you are at significant risk for relapse, re-hospitalization, and potentially more severe symptoms than you had before."',c:true},{t:'"Non-drug therapies including counseling, behavioral therapy, and vocational training are important complements to medication — they are not a substitute for continuing antipsychotic therapy."',c:true},{t:'"Since you are feeling better, it is reasonable to take the medication only on days when you feel more symptomatic."',c:false},{t:'"The goal of long-term antipsychotic therapy is not just to suppress your current symptoms, but to prevent future acute episodes and help you maintain the highest possible level of functioning."',c:true},{t:'"Since antipsychotics do not cause addiction, stopping them whenever you feel better is medically safe and will not affect your long-term prognosis."',c:false}],rat:'<strong>Correct: A, B, C, E.</strong> Comprehensive discharge teaching for schizophrenia: antipsychotics are NOT curative — they provide symptomatic relief and do not alter the underlying disease pathology (A); stopping medication dramatically increases relapse risk (B); non-drug therapies (counseling, behavioral therapy, vocational training) complement but do not replace pharmacotherapy (C); the three major treatment objectives extend beyond acute symptom suppression — prevention of exacerbations and maintenance of functioning are equally important long-term goals (E). <strong>D incorrect:</strong> PRN (as-needed) dosing is ineffective for schizophrenia — antipsychotics must maintain consistent therapeutic plasma levels through regular, scheduled dosing. Intermittent dosing leads to breakthrough psychosis. <strong>F incorrect — dangerous distractor:</strong> While physical dependence is rare with antipsychotics, "stopping whenever you feel better" is medically dangerous and significantly worsens long-term prognosis. The feeling of being "cured" is a recognized barrier to adherence — the nurse must address this directly. Abrupt discontinuation risks abstinence syndrome and rapid relapse.'}
];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
function letter(i){return LETTERS[i]||String(i+1);}
function withOriginalIndex(q){return q.type==='matrix'?q:{...q,choices:q.choices.map((ch,idx)=>({...ch,oid:idx}))};}
function currentIndexFromOriginal(q,origIdx){return q.choices.findIndex(ch=>(ch.oid??0)===origIdx);}
function mapOriginalLetter(q,ltr){const origIdx=ltr.charCodeAt(0)-65;const currentIdx=currentIndexFromOriginal(q,origIdx);return currentIdx>=0?letter(currentIdx):ltr;}
function mapLetterList(q,str){return str.replace(/\b[A-Z]\b/g,m=>mapOriginalLetter(q,m));}
function normalizeRationale(q){
  if(q.type==='matrix'||!q.rat)return q.rat||'';
  let rat=q.rat;
  rat=rat.replace(/(Correct:\s*)([A-Z](?:,\s*[A-Z])*(?:,\s*and\s*[A-Z])?)(?=[\.<])/g,(m,pfx,list)=>pfx+mapLetterList(q,list));
  rat=rat.replace(/(Require further teaching:\s*)([A-Z](?:,\s*[A-Z])*(?:,\s*and\s*[A-Z])?)(?=[\.<])/g,(m,pfx,list)=>pfx+mapLetterList(q,list));
  rat=rat.replace(/(Signs of toxicity:\s*)([A-Z](?:,\s*[A-Z])*(?:,\s*and\s*[A-Z])?)(?=[\.<])/g,(m,pfx,list)=>pfx+mapLetterList(q,list));
  rat=rat.replace(/\b([A-Z])(?=\s+incorrect\b)/g,(m,l)=>mapOriginalLetter(q,l));
  rat=rat.replace(/\b([A-Z])(?=\s+is expected adverse effect\b)/g,(m,l)=>mapOriginalLetter(q,l));
  rat=rat.replace(/\b([A-Z])(?=\s+is expected\b)/g,(m,l)=>mapOriginalLetter(q,l));
  rat=rat.replace(/\b([A-Z](?:,\s*[A-Z])*(?:,\s*and\s*[A-Z])?)(?=\s+all reflect\b)/g,(m,list)=>mapLetterList(q,list));
  return rat;
}
function buildAnswerReview(q){
  if(q.type==='matrix')return '';
  const sel=ANS[cur];
  let html='<div class="answer-review">';
  q.choices.forEach((ch,i)=>{
    let state='';
    if(q.type==='mcq'){
      if(ch.c)state='correct';
      else if(sel===i)state='incorrect';
    }else{
      const isSel=(sel||[]).includes(i);
      if(ch.c&&isSel)state='correct';
      else if(ch.c&&!isSel)state='missed';
      else if(!ch.c&&isSel)state='incorrect';
    }
    if(!state)return;
    const msg=state==='correct'
      ? 'This choice best matches the stem and the expected course concept.'
      : state==='missed'
        ? 'This was also a keyed answer and needed to be selected for full credit.'
        : 'This distractor is plausible, but it does not match the most accurate answer set for the stem.';
    const label=state==='correct'?'Keyed answer':state==='missed'?'Correct but missed':'Selected distractor';
    html+=`<div class="answer-review-item ${state}"><span class="choice-letter">${letter(i)}</span><div class="answer-review-main"><div class="choice-text">${ch.t}</div><div class="answer-state ${state}">${label}</div><p>${msg}</p></div></div>`;
  });
  return html+'</div>';
}
QS.forEach((q,idx)=>{if(q.type!=='matrix'){q.choices=q.choices.map((ch,oid)=>({...ch,oid}));q.choices=shuffle([...q.choices]);}});

let cur=0;
const ANS=new Array(QS.length).fill(null);
const DONE=new Array(QS.length).fill(false);
const SCORE=new Array(QS.length).fill(null);

function render(){
  updateProgress();
  const q=QS[cur];const done=DONE[cur];
  let html='<div class="q-card">';
  const tl=q.type==='mcq'?'Multiple Choice':q.type==='sata'?'Select All That Apply':'Extended Matrix';
  html+=`<div class="type-pill"><span class="dot"></span>${tl}</div>`;
  html+=`<div class="q-stem">${q.stem}</div>`;
  if(q.type==='mcq')html+=buildMCQ(q,done);
  if(q.type==='sata')html+=buildSATA(q,done);
  if(q.type==='matrix')html+=buildMatrix(q,done);
  if(done){
    const s=SCORE[cur];let tag='',tc='';
    if(q.type==='mcq'){tag=s.earned===1?'✓ Correct':'✗ Incorrect';tc=s.earned===1?'pass':'fail';}
    else if(q.type==='sata'){
      if(s.earned===s.total&&s.wrong===0){tag=`✓ Full credit — ${s.earned}/${s.total} correct`;tc='pass';}
      else if(s.earned>0){tag=`◐ Partial — ${s.earned}/${s.total} correct, ${s.wrong} incorrect selected`;tc='partial';}
      else{tag=`✗ No credit — ${s.earned}/${s.total} correct`;tc='fail';}
    }else{
      if(s.earned===s.total){tag=`✓ Full credit — ${s.earned}/${s.total} rows correct`;tc='pass';}
      else if(s.earned>0){tag=`◐ Partial — ${s.earned}/${s.total} rows correct`;tc='partial';}
      else{tag=`✗ No credit — ${s.earned}/${s.total} rows`;tc='fail';}
    }
    html+=`<div class="rationale visible"><div class="rationale-label">Rationale</div><div class="rationale-body">${normalizeRationale(q)}</div>${buildAnswerReview(q)}<div class="score-tag ${tc}">${tag}</div></div>`;
  }else{html+='<div class="rationale"></div>';}
  html+='</div>';
  document.getElementById('quizMain').innerHTML=html;
  document.getElementById('btnCheck').classList.toggle('hidden',done);
  document.getElementById('btnPrev').classList.toggle('hidden',cur===0);
  const last=cur===QS.length-1;
  document.getElementById('btnNext').classList.toggle('hidden',!done||last);
  document.getElementById('btnFinish').classList.toggle('hidden',!done||!last);
}

function buildMCQ(q,done){
  const sel=ANS[cur];
  let html='<div class="choices">';
  q.choices.forEach((ch,i)=>{
    let cls='choice'+(done?' locked':'');
    if(done){if(ch.c)cls+=' is-correct';else if(sel===i)cls+=' is-wrong';}
    const ck=sel===i?'checked':'';const dis=done?'disabled':'';
    const inputId=`mcq_${cur}_${i}`;
    html+=`<label class="${cls}" for="${inputId}"><input id="${inputId}" type="radio" name="mcq_${cur}" value="${ea(ch.t)}" ${ck} ${dis} onchange="selMCQ(${i})"><span class="choice-letter">${letter(i)}</span><span class="choice-text">${ch.t}</span></label>`;
  });
  return html+'</div>';
}

function buildSATA(q,done){
  const sel=ANS[cur]||[];
  let html='<div class="choices">';
  q.choices.forEach((ch,i)=>{
    const isSel=sel.includes(i);
    let cls='choice'+(done?' locked':'');
    if(done){if(ch.c&&isSel)cls+=' is-correct';else if(ch.c&&!isSel)cls+=' is-missed';else if(!ch.c&&isSel)cls+=' is-wrong';}
    const ck=isSel?'checked':'';const dis=done?'disabled':'';
    const inputId=`sata_${cur}_${i}`;
    html+=`<label class="${cls}" for="${inputId}"><input id="${inputId}" type="checkbox" ${ck} ${dis} onchange="togSATA(${i})"><span class="choice-letter">${letter(i)}</span><span class="choice-text">${ch.t}</span></label>`;
  });
  return html+'</div>';
}

function buildMatrix(q,done){
  const ans=ANS[cur]||{};
  let html='<div class="matrix-scroll"><table class="matrix-tbl"><tr><th>Scenario / Item</th>';
  q.cols.forEach(c=>{html+=`<th>${c}</th>`;});
  html+='</tr>';
  q.rows.forEach((row,ri)=>{
    const chosen=ans[ri];const chosenLabel=chosen!=null?q.cols[chosen]:null;
    let rc='';
    if(done)rc=chosenLabel===row.ans?'m-correct':'m-wrong';
    html+=`<tr class="${rc}"><td>${row.t}`;
    if(done&&chosenLabel!==row.ans)html+=`<span class="m-hint" style="color:var(--accent)">✓ Correct: ${row.ans}</span>`;
    else if(done)html+=`<span class="m-hint" style="color:var(--green)">✓ Correct</span>`;
    html+='</td>';
    q.cols.forEach((_,ci)=>{
      const ck=chosen===ci?'checked':'';const dis=done?'disabled':'';
      const inputId=`mx_${cur}_${ri}_${ci}`;
      html+=`<td><label for="${inputId}" style="display:inline-flex;cursor:${done?'default':'pointer'}"><input id="${inputId}" type="radio" name="mx_${cur}_${ri}" ${ck} ${dis} onchange="selMatrix(${ri},${ci})"></label></td>`;
    });
    html+='</tr>';
  });
  return html+'</table></div>';
}

function selMCQ(i){if(DONE[cur])return;ANS[cur]=i;}
function togSATA(i){if(DONE[cur])return;if(!ANS[cur])ANS[cur]=[];const p=ANS[cur].indexOf(i);if(p>=0)ANS[cur].splice(p,1);else ANS[cur].push(i);}
function selMatrix(ri,ci){if(DONE[cur])return;if(!ANS[cur])ANS[cur]={};ANS[cur][ri]=ci;}

function calcScore(q,ans){
  if(q.type==='mcq'){return{earned:(ans!=null&&q.choices[ans]&&q.choices[ans].c)?1:0,total:1,wrong:0};}
  if(q.type==='sata'){const ci=q.choices.map((c,i)=>c.c?i:-1).filter(i=>i>=0);const sel=ans||[];const earned=sel.filter(i=>ci.includes(i)).length;const wrong=sel.filter(i=>!ci.includes(i)).length;return{earned,total:ci.length,wrong};}
  if(q.type==='matrix'){const allAns=q.rows.every((_,ri)=>ans&&ans[ri]!=null);if(!allAns)return null;const earned=q.rows.filter((row,ri)=>ans[ri]!=null&&q.cols[ans[ri]]===row.ans).length;return{earned,total:q.rows.length,wrong:0};}
}

function hasValidSelection(q,ans){
  if(q.type==='mcq') return ans!==null && ans!==undefined;
  if(q.type==='sata') return Array.isArray(ans) && ans.length>0;
  if(q.type==='matrix') return !!ans && q.rows.every((_,ri)=>ans[ri]!==null && ans[ri]!==undefined);
  return false;
}

function checkAnswer(){
  const q=QS[cur];const ans=ANS[cur];
  if(!hasValidSelection(q,ans)){
    const msg=q.type==='matrix'
      ? 'Please select an answer for every row before checking.'
      : 'Please make a selection before checking.';
    alert(msg);
    return;
  }
  const s=calcScore(q,ans);
  if(s===null){alert('Please select an answer for every row before checking.');return;}
  SCORE[cur]=s;DONE[cur]=true;render();
}

function nav(d){cur+=d;render();}

function updateProgress(){
  const pct=Math.round(((cur+1)/QS.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('qCounter').textContent=`Question ${cur+1} of ${QS.length}`;
  document.getElementById('qPct').textContent=pct+'%';
}

function showFinal(){
  document.getElementById('quizMain').classList.add('hidden');
  document.getElementById('btnBar').classList.add('hidden');
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('qCounter').textContent='Exam Complete';
  document.getElementById('qPct').textContent='100%';
  let mcqE=0,mcqT=0,sataE=0,sataT=0,matE=0,matT=0,totalE=0,totalT=0;
  QS.forEach((q,i)=>{
    const s=SCORE[i]||{earned:0,total:1,wrong:0};
    totalE+=s.earned;totalT+=s.total;
    if(q.type==='mcq'){mcqE+=s.earned;mcqT+=s.total;}
    if(q.type==='sata'){sataE+=s.earned;sataT+=s.total;}
    if(q.type==='matrix'){matE+=s.earned;matT+=s.total;}
  });
  const pct=Math.round((totalE/totalT)*100);
  let grade,gc;
  if(pct>=90){grade='Excellent';gc='var(--green)';}
  else if(pct>=80){grade='Proficient';gc='var(--accent)';}
  else if(pct>=70){grade='Developing';gc='var(--amber)';}
  else{grade='Needs Review';gc='var(--red)';}
  document.getElementById('finalSection').innerHTML=`
  <div class="final-wrap"><div class="final-card">
    <div class="final-eyebrow">PP2 · Psychosis &amp; Bipolar Pharmacology</div>
    <div class="final-score" style="-webkit-text-fill-color:${gc};color:${gc};background:none">${pct}%</div>
    <div class="final-pct-label">${totalE} / ${totalT} total points earned</div>
    <div class="final-grade" style="color:${gc}">${grade}</div>
    <div class="stat-grid">
      <div class="stat-box"><strong>${mcqE}/${mcqT}</strong>Multiple Choice</div>
      <div class="stat-box"><strong>${sataE}/${sataT}</strong>SATA Points</div>
      <div class="stat-box"><strong>${matE}/${matT}</strong>Matrix Points</div>
    </div>
    <button class="btn btn-restart" onclick="restart()">↺ Retake Exam</button>
  </div></div>`;
  document.getElementById('finalSection').classList.remove('hidden');
}

function restart(){
  cur=0;ANS.fill(null);DONE.fill(false);SCORE.fill(null);
  QS.forEach(q=>{if(q.type!=='matrix')q.choices=shuffle([...q.choices]);});
  document.getElementById('quizMain').classList.remove('hidden');
  document.getElementById('btnBar').classList.remove('hidden');
  document.getElementById('finalSection').classList.add('hidden');
  render();
}

function ea(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
render();
</script>
</body>
</html>

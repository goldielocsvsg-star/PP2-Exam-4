{t:'bowtie',
stem:'The nurse is caring for a client who has been receiving haloperidol 5 mg IM every 4 hours for three days. The client develops a temperature of 104.2°F, severe generalized muscle rigidity described as "lead-pipe," profuse diaphoresis, blood pressure of 168/102 mmHg, and an acute change in mental status. The client is unresponsive to commands.',
lLabel:'Which 2 assessment findings most strongly support the suspected diagnosis? (Select 2)',
lOpts:[{l:'A',x:'Temperature of 104.2°F and severe generalized muscle rigidity'},{l:'B',x:'Blood pressure of 168/102 mmHg suggesting medication-induced hypertension'},{l:'C',x:'History of haloperidol administration in preceding days'},{l:'D',x:'Fine hand tremor noted during medication administration two days ago'},{l:'E',x:'Client reports feeling "restless" and unable to sit still'}],
lAns:['A','C'],
cLabel:'The nurse\'s priority action is: (Select 1)',
cOpts:[{l:'1',x:'Administer benztropine mesylate IM to treat EPS immediately'},{l:'2',x:'Immediately discontinue haloperidol and notify the provider for emergency management'},{l:'3',x:'Reduce the haloperidol dose by 50% and add a cooling blanket'},{l:'4',x:'Administer acetaminophen for fever and reassess in one hour'},{l:'5',x:'Apply bilateral soft wrist restraints to prevent injury from rigidity'}],
cAns:'2',
rLabel:'Which 2 medications or interventions should the nurse anticipate the provider ordering? (Select 2)',
rOpts:[{l:'W',x:'Benztropine mesylate (Cogentin) IM to treat EPS-related muscle rigidity'},{l:'X',x:'Dantrolene sodium to reduce severe muscle rigidity and hyperthermia'},{l:'Y',x:'Bromocriptine to address dopaminergic CNS toxicity of NMS'},{l:'Z',x:'Oral lithium carbonate to stabilize the client\'s mood during the crisis'},{l:'V',x:'Haloperidol decanoate IM as a depot alternative to oral therapy'}],
rAns:['X','Y'],
rat:'<strong>Left — A and C:</strong> The classic NMS tetrad is hyperthermia + severe generalized rigidity + diaphoresis + altered mental status. Options A (fever + rigidity) and C (recent haloperidol — the causative agent) directly support the NMS diagnosis. Option B (hypertension) is a finding in NMS but is less diagnostically specific than the tetrad findings. Options D (fine tremor) and E (restlessness) describe EPS (parkinsonism and akathisia respectively), not NMS. <strong>Center — #2:</strong> Immediate discontinuation of haloperidol is the single most critical first action in NMS. The causative agent must be stopped before any other intervention. <strong>Right — X and Y:</strong> Dantrolene (direct-acting muscle relaxant) and bromocriptine (dopamine agonist for CNS toxicity) are the two pharmacologic agents specifically used in NMS management per course materials. Benztropine (W) treats EPS, not NMS — a critical distinction. Lithium (Z) and haloperidol depot (V) have no role in NMS emergency management.'
},
{t:'bowtie',
stem:'A client admitted with acute mania is receiving lithium carbonate 600 mg three times daily. On day four, the client reports "I feel horrible — I\'m sick to my stomach, my hands are shaking badly, and I feel like I\'m drunk." Assessment reveals a coarse bilateral hand tremor, ataxic gait, slurred speech, and confusion. The morning serum level drawn 12 hours post-last-dose returns at 1.8 mEq/L.',
lLabel:'Which 2 findings most strongly support the suspected complication? (Select 2)',
lOpts:[{l:'A',x:'Coarse hand tremor, slurred speech, and confusion consistent with CNS toxicity'},{l:'B',x:'Fine bilateral tremor noted since day one of therapy — expected at therapeutic levels'},{l:'C',x:'Serum lithium level of 1.8 mEq/L exceeding the 1.5 mEq/L toxicity threshold'},{l:'D',x:'Client\'s subjective report of nausea, reported during medication initiation as a minor GI effect'},{l:'E',x:'Client is receiving lithium three times daily — the dose frequency alone explains the symptoms'}],
lAns:['A','C'],
cLabel:'The nurse\'s priority action is: (Select 1)',
cOpts:[{l:'1',x:'Administer the next scheduled lithium dose with a full glass of water and encourage oral fluids'},{l:'2',x:'Hold the lithium dose, notify the provider immediately, and prepare for possible IV hydration and supportive care'},{l:'3',x:'Reduce the lithium dose by half and recheck the level in 48 hours'},{l:'4',x:'Continue lithium at current dose and administer an antiemetic for the nausea'},{l:'5',x:'Administer sodium bicarbonate to alkalinize the urine and accelerate lithium excretion'}],
cAns:'2',
rLabel:'Which 2 interventions should the nurse anticipate after the provider is notified? (Select 2)',
rOpts:[{l:'W',x:'Provide IV normal saline hydration to promote lithium excretion and restore sodium balance'},{l:'X',x:'Prepare client for possible hemodialysis if toxicity is severe or does not respond to supportive care'},{l:'Y',x:'Initiate a low-sodium diet to reduce fluid retention during the acute episode'},{l:'Z',x:'Administer furosemide IV to increase urine output and accelerate lithium clearance'},{l:'V',x:'Administer ibuprofen to treat the headache and joint discomfort from lithium toxicity'}],
rAns:['W','X'],
rat:'<strong>Left — A and C:</strong> CNS signs of toxicity (coarse tremor, slurred speech, ataxia, confusion) combined with a supratherapeutic level (1.8 > 1.5 mEq/L) are the two most direct and compelling indicators of lithium toxicity. Fine tremor (B) is expected at therapeutic levels, not a toxicity marker. Nausea on day one (D) and TID dosing (E) alone do not constitute clinical toxicity indicators. <strong>Center — #2:</strong> The immediate priority is holding lithium, notifying the provider, and preparing for supportive care. Giving the next dose (1 and 4) would compound toxicity. Sodium bicarbonate (5) is not the documented course-material intervention for lithium toxicity. <strong>Right — W and X:</strong> IV normal saline promotes lithium renal clearance by restoring sodium balance, and hemodialysis is the intervention for severe or unresponsive lithium toxicity. Low-sodium diet (Y) is contraindicated — it would worsen toxicity. Furosemide (Z) causes sodium loss, triggering compensatory lithium reabsorption and worsening toxicity. Ibuprofen (V) reduces renal lithium clearance and is absolutely contraindicated.'
},
{t:'bowtie',
stem:'A client admitted to an inpatient unit is given haloperidol 5 mg IM for agitation. Forty-five minutes later, the client calls out for help. The nurse finds the client with the eyes forcibly deviated upward and to the right (oculogyric crisis), the head twisted to the right, sustained jaw and neck spasms, and extreme difficulty swallowing. The client is conscious and terrified.',
lLabel:'Which 2 findings most support the priority nursing diagnosis? (Select 2)',
lOpts:[{l:'A',x:'Forced upward and lateral eye deviation (oculogyric crisis) and sustained cervical muscle spasm'},{l:'B',x:'Subjective restlessness and pacing behavior since the haloperidol injection'},{l:'C',x:'Onset within 45 minutes of the first IM dose of haloperidol'},{l:'D',x:'Pill-rolling tremor and shuffling gait developing over the last three days'},{l:'E',x:'Temperature of 103.8°F and diffuse muscle rigidity with diaphoresis'}],
lAns:['A','C'],
cLabel:'The nurse\'s immediate priority action is: (Select 1)',
cOpts:[{l:'1',x:'Administer oral trihexyphenidyl for antipsychotic-induced parkinsonism'},{l:'2',x:'Administer benztropine mesylate (Cogentin) IM or IV for rapid relief of acute dystonia'},{l:'3',x:'Stop all antipsychotic therapy permanently and document the allergy'},{l:'4',x:'Apply soft restraints and call for assistance while monitoring the airway'},{l:'5',x:'Administer diphenhydramine (Benadryl) orally and monitor for improvement over 30 minutes'}],
cAns:'2',
rLabel:'Which 2 parameters should the nurse monitor after the intervention? (Select 2)',
rOpts:[{l:'W',x:'Symptom resolution within minutes following IM/IV administration'},{l:'X',x:'Level of consciousness and ability to swallow, given the risk of airway compromise from jaw/throat spasm'},{l:'Y',x:'Serum haloperidol level to determine whether the dose caused toxicity'},{l:'Z',x:'Serum lithium level to rule out lithium toxicity as a contributing factor'},{l:'V',x:'Blood glucose for hyperglycemia related to dystonia-induced metabolic stress'}],
rAns:['W','X'],
rat:'<strong>Left — A and C:</strong> Oculogyric crisis and cervical muscle spasm are hallmark features of acute dystonia. Early onset (within 45 minutes to days of FGA initiation) is diagnostically characteristic. Pacing/restlessness (B) describes akathisia. Pill-rolling tremor/shuffling gait (D) describes drug-induced parkinsonism. Fever and rigidity (E) describe NMS — a different, more serious condition. <strong>Center — #2:</strong> Severe acute dystonia with oculogyric crisis requires IM or IV benztropine mesylate for rapid effect (symptom relief within minutes). Oral trihexyphenidyl (1) is for parkinsonism, not acute severe dystonia, and oral administration is unsafe when swallowing is impaired. Diphenhydramine orally (5) is oral — same problem with swallowing; parenteral is required for acute severe dystonia. Permanently labeling as an allergy (3) is incorrect; EPS is a predictable drug effect, not an allergy. <strong>Right — W and X:</strong> After IM benztropine, the nurse monitors for rapid symptom resolution (documented effect) and for airway safety/swallowing ability given the jaw and throat involvement. Haloperidol level (Y), lithium level (Z), and blood glucose (V) are not relevant monitoring parameters for acute dystonia management.'
},
{t:'bowtie',
stem:'A client enrolled in the clozapine REMS program calls the clinic, reporting: "I\'ve had a fever of 101.4°F for two days, my throat is sore, and I have small sores in my mouth. I\'ve been taking my clozapine every day." Last REMS-mandated CBC was drawn five days ago and showed WBC 3,200/mm³.',
lLabel:'Which 2 factors most support the suspected urgent complication? (Select 2)',
lOpts:[{l:'A',x:'Fever, sore throat, and oral ulcers in a client on clozapine'},{l:'B',x:'Sedation and weight gain reported since starting clozapine six weeks ago'},{l:'C',x:'WBC 3,200/mm³ on most recent draw — borderline low and declining toward the REMS threshold'},{l:'D',x:'Client is taking clozapine daily without missed doses'},{l:'E',x:'Client reports increased appetite and difficulty sleeping since starting the medication'}],
lAns:['A','C'],
cLabel:'The nurse\'s priority action is: (Select 1)',
cOpts:[{l:'1',x:'Advise the client to continue clozapine and take acetaminophen for fever and throat pain'},{l:'2',x:'Instruct the client to hold clozapine, go to the emergency department immediately, and have CBC with ANC drawn urgently'},{l:'3',x:'Schedule the client for a routine follow-up appointment in one week for repeat CBC'},{l:'4',x:'Advise the client to reduce the clozapine dose by half until symptoms resolve'},{l:'5',x:'Recommend the client gargle with warm salt water and monitor symptoms for 48 hours before calling back'}],
cAns:'2',
rLabel:'Which 2 parameters should the nurse instruct the client to have monitored at the emergency department? (Select 2)',
rOpts:[{l:'W',x:'WBC count and absolute neutrophil count (ANC) for comparison to REMS threshold values'},{l:'X',x:'Serum clozapine trough level to confirm supratherapeutic toxicity as the cause of symptoms'},{l:'Y',x:'Throat culture and sensitivity to identify the bacterial organism causing the throat infection'},{l:'Z',x:'Serum lithium level to rule out concomitant drug toxicity as the etiology'},{l:'V',x:'Complete metabolic panel to assess for hepatic and renal function changes from agranulocytosis'}],
rAns:['W','V'],
rat:'<strong>Left — A and C:</strong> Fever, sore throat, and oral ulcers are the classic warning signs of clozapine-induced agranulocytosis. A borderline WBC of 3,200/mm³ (approaching the REMS hold threshold of 3,000/mm³) adds objective hematologic support for urgent evaluation. Sedation and weight gain (B) are expected adverse effects, not indicators of agranulocytosis. Adherence without missed doses (D) is a neutral finding. Increased appetite and insomnia (E) are non-specific adverse effects unrelated to this emergency. <strong>Center — #2:</strong> Clozapine must be held immediately and the client sent to the emergency department for urgent CBC/ANC. Waiting (1, 3, 5) or dose-reducing (4) in the setting of possible agranulocytosis is a serious patient safety failure. <strong>Right — W and V:</strong> WBC and ANC are the primary laboratory values that will determine severity and REMS decision. A complete metabolic panel assesses hepatic and renal function, which can be compromised during severe infection/agranulocytosis. Serum clozapine level (X) is not routinely used clinically in the same standardized way as lithium levels. A throat culture (Y) may be done but is not the priority — the primary question is whether agranulocytosis is present, not which bacteria is present. Lithium level (Z) is irrelevant — this client takes clozapine, not lithium.'
},
{t:'bowtie',
stem:'A client receiving aripiprazole for schizophrenia develops a new complaint: "I feel like I absolutely cannot stop moving — my legs are always restless, I keep pacing, and I can\'t sit still even when I want to." The client appears distressed and is observed repeatedly standing up, shifting, and sitting back down.',
lLabel:'Which 2 findings best support the suspected EPS complication? (Select 2)',
lOpts:[{l:'A',x:'Subjective inability to remain still combined with repetitive motor restlessness'},{l:'B',x:'Sustained jaw spasm and involuntary head rotation'},{l:'C',x:'Temporal relationship between aripiprazole initiation and symptom onset'},{l:'D',x:'Pill-rolling tremor and cogwheel rigidity of both wrists'},{l:'E',x:'Repetitive lip-smacking and tongue protrusion lasting for several months'}],
lAns:['A','C'],
cLabel:'The nurse\'s priority action is: (Select 1)',
cOpts:[{l:'1',x:'Administer benztropine mesylate IM for rapid pharmacologic relief'},{l:'2',x:'Notify the provider; document findings and discuss dose reduction or a beta-blocker (e.g., propranolol) for akathisia management'},{l:'3',x:'Reassure the client this is expected; all antipsychotics cause permanent restlessness'},{l:'4',x:'Instruct the client to engage in vigorous exercise twice daily to reduce the restless sensation'},{l:'5',x:'Stop all antipsychotic therapy and discharge the client from the program'}],
cAns:'2',
rLabel:'Which 2 interventions or assessments should the nurse prioritize? (Select 2)',
rOpts:[{l:'W',x:'Document the onset, severity, and impact on daily function using a standardized EPS assessment tool'},{l:'X',x:'Obtain a STAT ECG to rule out QT prolongation as the cause of the motor symptoms'},{l:'Y',x:'Administer benztropine mesylate orally as first-line treatment per protocol'},{l:'Z',x:'Review any recent dose changes to aripiprazole that may correlate with onset'},{l:'V',x:'Draw serum CK level to rule out NMS as the underlying cause of motor symptoms'}],
rAns:['W','Z'],
rat:'<strong>Left — A and C:</strong> Akathisia is defined by subjective inner restlessness with motor manifestations (inability to remain still, pacing, shifting). Combined with a clear temporal relationship to aripiprazole initiation, these two findings specifically support akathisia. Sustained jaw spasm/head rotation (B) describes acute dystonia. Pill-rolling tremor/cogwheel rigidity (D) describes drug-induced parkinsonism. Lip-smacking/tongue protrusion over months (E) describes tardive dyskinesia. <strong>Center — #2:</strong> Akathisia management involves notifying the provider and considering dose reduction or a beta-blocker (propranolol). Benztropine IM (1) is specifically for acute dystonia, not akathisia — this is a critical distinction. Reassuring as expected (3) is dismissive. Exercise (4) and stopping all therapy (5) are inappropriate responses. <strong>Right — W and Z:</strong> Standardized EPS documentation establishes a baseline for treatment response evaluation. Recent dose changes are a common precipitant of akathisia and must be reviewed. ECG (X) addresses cardiac arrhythmia, not the cause of akathisia. Oral benztropine (Y) is not the first-line choice for akathisia (beta-blockers are preferred over anticholinergics for this EPS subtype). Serum CK (V) would help rule out NMS but the presentation lacks NMS features (hyperthermia, global rigidity, altered consciousness).'
},
{t:'bowtie',
stem:'A client with bipolar I disorder has been admitted to the inpatient unit. Current medications include divalproex 1,000 mg twice daily, started 10 days ago. The client reports right upper quadrant abdominal pain (rated 7/10), nausea, vomiting for two days, and appears jaundiced. A complete metabolic panel is resulted showing AST 428 units/L, ALT 512 units/L, and a divalproex trough level of 141 mcg/mL.',
lLabel:'Which 2 findings most support the suspected complication? (Select 2)',
lOpts:[{l:'A',x:'RUQ abdominal pain, jaundice, and markedly elevated liver enzymes (AST 428, ALT 512)'},{l:'B',x:'Nausea and vomiting, which are expected early GI adverse effects of divalproex'},{l:'C',x:'Divalproex trough level of 141 mcg/mL — above the therapeutic ceiling of 120 mcg/mL'},{l:'D',x:'Client\'s bipolar I diagnosis, which is associated with elevated liver enzymes at baseline'},{l:'E',x:'Client is taking 1,000 mg twice daily, which is within a standard dosing range'}],
lAns:['A','C'],
cLabel:'The nurse\'s immediate priority action is: (Select 1)',
cOpts:[{l:'1',x:'Continue divalproex as scheduled; elevated LFTs during the first two weeks are an expected initiation effect'},{l:'2',x:'Hold divalproex and notify the provider immediately for evaluation of hepatotoxicity'},{l:'3',x:'Reduce the divalproex dose by 50% and recheck liver enzymes in one week'},{l:'4',x:'Administer acetylcysteine IV as an antidote for divalproex hepatotoxicity'},{l:'5',x:'Obtain a hepatitis viral panel before making any medication changes'}],
cAns:'2',
rLabel:'Which 2 assessments or interventions should the nurse prioritize next? (Select 2)',
rOpts:[{l:'W',x:'Assess for bruising, petechiae, and prolonged bleeding time indicating concurrent thrombocytopenia'},{l:'X',x:'Assess for new skin rash to rule out concurrent Stevens-Johnson syndrome from divalproex'},{l:'Y',x:'Draw a serum ammonia level to assess for hyperammonemic encephalopathy from valproate toxicity'},{l:'Z',x:'Administer dantrolene to reduce the hepatic inflammation and enzyme elevation'},{l:'V',x:'Draw a serum lithium level to rule out lithium contributing to the hepatic changes'}],
rAns:['W','Y'],
rat:'<strong>Left — A and C:</strong> RUQ pain, jaundice, and dramatically elevated LFTs (AST/ALT five to ten times the upper normal limit) are the direct clinical indicators of hepatotoxicity. A supratherapeutic level (141 > 120 mcg/mL) explains the mechanism. Nausea/vomiting (B) can be early GI effects, but in the context of jaundice and elevated enzymes, they represent hepatotoxicity symptoms rather than an isolated GI effect. Bipolar diagnosis (D) does not cause elevated LFTs. Standard dosing (E) is a neutral factor when a level exists. <strong>Center — #2:</strong> Divalproex must be held immediately and the provider notified for hepatotoxicity evaluation. Continuing (1) worsens hepatocellular damage. Dose reduction (3) is insufficient for documented hepatotoxicity with jaundice. Acetylcysteine (4) is used for acetaminophen hepatotoxicity, not divalproex. Waiting for a hepatitis panel (5) delays critical drug withdrawal. <strong>Right — W and Y:</strong> Concurrent thrombocytopenia is a documented co-adverse effect of divalproex and must be assessed when hepatotoxicity is suspected. Hyperammonemic encephalopathy (elevated ammonia) is a specific and serious CNS complication of valproate toxicity. SJS (X) is lamotrigine\'s signature risk, not divalproex. Dantrolene (Z) treats NMS/malignant hyperthermia — not hepatic inflammation. Lithium level (V) is irrelevant; this client is not prescribed lithium.'
},
{t:'bowtie',
stem:'A client with schizophrenia has been receiving chlorpromazine for 22 months. During a medication reconciliation visit, the nurse observes continuous rhythmic tongue movements, bilateral lip-pursing movements, choreoathetoid movements of both hands and fingers, and slow twisting movements of the trunk. The client reports being unaware of these movements until the nurse pointed them out.',
lLabel:'Which 2 findings most strongly support the suspected condition? (Select 2)',
lOpts:[{l:'A',x:'Duration of antipsychotic therapy (22 months) consistent with late-onset EPS development'},{l:'B',x:'Repetitive involuntary tongue, lip, and choreiform hand/trunk movements the client is unaware of'},{l:'C',x:'Sudden onset of neck spasm and jaw deviation requiring immediate IM anticholinergic treatment'},{l:'D',x:'Subjective inner restlessness with repeated leg crossing and inability to remain seated'},{l:'E',x:'Fever, muscle rigidity, and diaphoresis noted at the beginning of the visit'}],
lAns:['A','B'],
cLabel:'The nurse\'s priority action is: (Select 1)',
cOpts:[{l:'1',x:'Administer benztropine mesylate IM immediately — anticholinergics resolve all forms of EPS'},{l:'2',x:'Document findings, notify the prescriber, and complete a formal AIMS assessment'},{l:'3',x:'Reassure the client and family that these movements are temporary and will self-resolve'},{l:'4',x:'Increase the chlorpromazine dose to suppress the involuntary movements'},{l:'5',x:'Label this as an allergic reaction to chlorpromazine and begin an antihistamine taper'}],
cAns:'2',
rLabel:'Which 2 nursing responsibilities are most appropriate after notifying the provider? (Select 2)',
rOpts:[{l:'W',x:'Conduct an AIMS (Abnormal Involuntary Movement Scale) assessment to quantify severity and establish a documented baseline'},{l:'X',x:'Administer an anticholinergic agent — tardive dyskinesia responds well to benztropine'},{l:'Y',x:'Educate the client and family that these movements may be irreversible and the provider may consider reducing or changing the antipsychotic'},{l:'Z',x:'Begin oral haloperidol as a replacement since it has a lower TD risk than chlorpromazine at equivalent doses'},{l:'V',x:'Initiate seizure precautions, as choreiform movements may represent subcortical seizure activity'}],
rAns:['W','Y'],
rat:'<strong>Left — A and B:</strong> Tardive dyskinesia classically develops after prolonged antipsychotic therapy (months to years — 22 months supports this) and presents with involuntary repetitive abnormal movements (tongue, lips, choreiform/athetoid extremity, truncal movements) that the client is typically unaware of. Neck spasm + jaw deviation (C) describes acute dystonia. Subjective restlessness (D) describes akathisia. Fever/rigidity/diaphoresis (E) describes NMS. <strong>Center — #2:</strong> Tardive dyskinesia requires documentation, provider notification, and formal AIMS assessment. Benztropine IM (1) is for acute dystonia; anticholinergics do not treat TD and may worsen it. Reassuring as temporary (3) is inaccurate — TD may be permanent. Increasing the dose (4) may worsen TD. Labeling as allergy (5) is clinically incorrect. <strong>Right — W and Y:</strong> AIMS assessment is the standard clinical tool for documenting and quantifying TD. Client and family education about potential irreversibility and medication reassessment is an essential nursing responsibility. Anticholinergics (X) are not appropriate for TD and may worsen it — this is a critical trap. Switching to haloperidol (Z) may not improve TD and is not the nurse\'s decision. Seizure precautions (V) are not indicated — choreiform movements from TD are involuntary movement disorders, not seizures.'
},
{t:'bowtie',
stem:'A client with bipolar II disorder who has been stable on lithium for eight months calls the nurse triage line. The client recently moved and has been hiking daily in hot weather. They report: "I\'ve been sweating a lot and I forgot to eat much the past two days. I have bad diarrhea and my hands are shaking like crazy — worse than before. I feel really confused and I almost fell down the stairs."',
lLabel:'Which 2 factors most likely precipitated this client\'s current condition? (Select 2)',
lOpts:[{l:'A',x:'Excessive sweating and inadequate food intake over two days causing sodium and fluid depletion'},{l:'B',x:'New exercise routine involving daily hiking, which therapeutically stabilizes mood and increases lithium tolerance'},{l:'C',x:'Diarrhea causing additional sodium and fluid losses that reduce lithium renal excretion'},{l:'D',x:'Change in geographic location causing a stress response that increases lithium metabolism'},{l:'E',x:'Coarse hand tremor, which is a normal and expected finding at all lithium levels'}],
lAns:['A','C'],
cLabel:'The nurse\'s priority instruction to the client is: (Select 1)',
cOpts:[{l:'1',x:'Drink two large glasses of water and rest; these symptoms are expected during exercise-induced dehydration'},{l:'2',x:'Do not take the next lithium dose; go to the emergency department or call 911 immediately'},{l:'3',x:'Take the next lithium dose with a salty snack and eat a full meal as soon as possible'},{l:'4',x:'Reduce the lithium dose by half and recheck symptoms in four hours before deciding on emergency care'},{l:'5',x:'Take ibuprofen for the discomfort and rest until the confusion resolves on its own'}],
cAns:'2',
rLabel:'Which 2 interventions should the nurse anticipate will be needed at the emergency department? (Select 2)',
rOpts:[{l:'W',x:'IV normal saline infusion to restore sodium balance and promote renal lithium excretion'},{l:'X',x:'Stat serum lithium level to confirm toxicity and guide management decisions'},{l:'Y',x:'Administration of furosemide to increase urinary output and accelerate lithium elimination'},{l:'Z',x:'Administration of ibuprofen IM for pain and anti-inflammatory support during the crisis'},{l:'V',x:'Initiation of a low-sodium diet during hospitalization to prevent future fluctuations'}],
rAns:['W','X'],
rat:'<strong>Left — A and C:</strong> The two specific precipitating mechanisms for lithium toxicity are (A) sodium/fluid depletion from sweating and poor oral intake (the kidney compensatorily reabsorbs more lithium in the setting of sodium depletion) and (C) diarrhea causing additional sodium and fluid losses with the same renal compensatory lithium reabsorption. Both mechanisms are documented in the course material as precipitants of lithium toxicity. Geographic change (D) and increased exercise (B) are not documented pharmacokinetic precipitants of lithium toxicity. Coarse tremor (E) in this context is a toxicity sign, not a "normal expected finding." <strong>Center — #2:</strong> The presentation — confusion, near-fall, coarse tremor, and multiple precipitating factors — indicates lithium toxicity. The client must not take the next dose and needs emergency evaluation. Self-managing with fluids (1), reducing dose independently (4), or taking ibuprofen (5) are all dangerous. Taking lithium with a salty snack (3) would add more lithium when toxicity is already suspected. <strong>Right — W and X:</strong> IV normal saline replenishes sodium, restores fluid balance, and promotes renal lithium excretion. A stat serum lithium level is essential to confirm toxicity and guide treatment decisions. Furosemide (Y) causes sodium and fluid loss, worsening lithium reabsorption and toxicity — it is absolutely contraindicated. Ibuprofen (Z) reduces renal lithium clearance, compounding toxicity. Low-sodium diet during hospitalization (V) would dramatically worsen toxicity — sodium restriction during lithium therapy is contraindicated.'
}
];

// ═══════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════
function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function relabel(opts){
  const labs='ABCDEFGHI'.split('');
  opts.forEach((o,i)=>o.l=labs[i]);
}
function shuffleAndRelabel(q){
  if(q.t==='mc'||q.t==='sata'){
    const correctTexts=q.ans.map(a=>q.opts.find(o=>o.l===a).x);
    q.opts=shuffle(q.opts);
    relabel(q.opts);
    q.ans=q.opts.filter(o=>correctTexts.includes(o.x)).map(o=>o.l);
  }
  if(q.t==='bowtie'){
    const lcx=q.lAns.map(a=>q.lOpts.find(o=>o.l===a).x);
    const rcx=q.rAns.map(a=>q.rOpts.find(o=>o.l===a).x);
    const ccx=q.cOpts.find(o=>o.l===q.cAns).x;
    q.lOpts=shuffle(q.lOpts); relabel(q.lOpts);
    q.cOpts=shuffle(q.cOpts);
    const numLabs='12345678'.split('');
    q.cOpts.forEach((o,i)=>o.l=numLabs[i]);
    q.rOpts=shuffle(q.rOpts); relabel(q.rOpts);
    q.lAns=q.lOpts.filter(o=>lcx.includes(o.x)).map(o=>o.l);
    q.cAns=q.cOpts.find(o=>o.x===ccx).l;
    q.rAns=q.rOpts.filter(o=>rcx.includes(o.x)).map(o=>o.l);
  }
}

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let SQ=[],ci=0,ep=0,maxPts=0;
const typeMap={mc:'◉ Multiple Choice',sata:'☑ Select All That Apply',matrix:'⊞ Clinical Matrix',bowtie:'⬡ Bowtie / Clinical Judgment'};

function init(){
  SQ=shuffle(BANK.map(q=>JSON.parse(JSON.stringify(q))));
  SQ.forEach(q=>shuffleAndRelabel(q));
  ci=0; ep=0; maxPts=0;
  // Calculate max points
  SQ.forEach(q=>{
    if(q.t==='mc') maxPts+=1;
    else if(q.t==='sata') maxPts+=1;
    else if(q.t==='matrix') maxPts+=1;
    else if(q.t==='bowtie') maxPts+=3;
  });
  document.getElementById('scoreScr').style.display='none';
  document.getElementById('progSection').style.display='block';
  document.getElementById('qArea').style.display='block';
  render();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const q=SQ[ci];
  const tot=SQ.length;
  document.getElementById('progTxt').textContent=`Question ${ci+1} of ${tot}`;
  document.getElementById('scoreTxt').textContent=`Score: ${ep.toFixed(1)} / ${maxPts}`;
  document.getElementById('progFill').style.width=`${(ci/tot)*100}%`;
  let html='';
  if(q.t==='mc') html=renderMC(q);
  else if(q.t==='sata') html=renderSATA(q);
  else if(q.t==='matrix') html=renderMatrix(q);
  else if(q.t==='bowtie') html=renderBowtie(q);
  document.getElementById('qArea').innerHTML=html;
}
function cardOpen(type,q){
  return `<div class="card${type==='sata'?' sata-card':''}" id="qCard">
    <div class="badge">${typeMap[type]}</div>
    <div class="qnum">Question ${ci+1} of ${SQ.length}</div>
    <div class="stem">${q.stem}</div>`;
}
function cardClose(fn){
  return `<button class="btn-sub" id="subBtn" onclick="${fn}">Submit Answer</button>
  <button class="btn-nxt" id="nxtBtn" onclick="nextQ()">Next Question →</button>
  <div class="rat-box" id="ratBox"></div></div>`;
}
function renderMC(q){
  const opts=q.opts.map((o,i)=>`<li class="opt-item">
    <input type="radio" name="qr" id="o${i}" value="${o.l}">
    <label class="opt-lbl" for="o${i}"><span class="opt-dot">${o.l}</span><span>${o.x}</span></label></li>`).join('');
  return cardOpen('mc',q)+`<ul class="opts" id="oList">${opts}</ul>`+cardClose('submitMC()');
}
function renderSATA(q){
  const opts=q.opts.map((o,i)=>`<li class="opt-item">
    <input type="checkbox" name="qr" id="o${i}" value="${o.l}">
    <label class="opt-lbl" for="o${i}"><span class="opt-dot">${o.l}</span><span>${o.x}</span></label></li>`).join('');
  return cardOpen('sata',q)+`<div class="inst">Select all that apply.</div><ul class="opts" id="oList">${opts}</ul>`+cardClose('submitSATA()');
}
function renderMatrix(q){
  const th=q.cols.map(c=>`<th>${c}</th>`).join('');
  const rows=q.rows.map((r,ri)=>{
    const cells=q.cols.map((_,ci2)=>`<td id="mc_${ri}_${ci2}">
      <span><input class="mrl-input" type="radio" name="mr${ri}" id="mr${ri}_${ci2}" value="${ci2}">
      <label class="mrl" for="mr${ri}_${ci2}"></label></span></td>`).join('');
    return `<tr><td>${r.x}</td>${cells}</tr>`;
  }).join('');
  return cardOpen('matrix',q)+`<div class="mtx-wrap"><table class="mtx">
    <thead><tr><th>Nursing Action / Finding</th>${th}</tr></thead>
    <tbody>${rows}</tbody></table></div>`+cardClose('submitMatrix()');
}
function renderBowtie(q){
  const lOpts=q.lOpts.map((o,i)=>`<div class="bt-opt-item bt-chk">
    <input type="checkbox" id="lo${i}" name="bt_l" value="${o.l}">
    <label class="bt-lbl" for="lo${i}"><span class="bt-dot">${o.l}</span><span>${o.x}</span></label></div>`).join('');
  const cOpts=q.cOpts.map((o,i)=>`<div class="bt-opt-item">
    <input type="radio" id="co${i}" name="bt_c" value="${o.l}">
    <label class="bt-lbl" for="co${i}"><span class="bt-dot">${o.l}</span><span>${o.x}</span></label></div>`).join('');
  const rOpts=q.rOpts.map((o,i)=>`<div class="bt-opt-item bt-chk">
    <input type="checkbox" id="ro${i}" name="bt_r" value="${o.l}">
    <label class="bt-lbl" for="ro${i}"><span class="bt-dot">${o.l}</span><span>${o.x}</span></label></div>`).join('');
  const btBody=`<div class="bt-wrap">
    <div class="bt-panel"><div class="bt-plabel">${q.lLabel}</div>${lOpts}<div class="bt-note">(Select 2)</div></div>
    <div class="bt-arrows"><div class="bt-arrow-l">▶</div><div style="font-size:.55rem;color:var(--lpu);font-weight:900;writing-mode:vertical-rl;text-align:center;letter-spacing:1px">LEADS TO</div><div class="bt-arrow-r">▶</div></div>
    <div class="bt-panel-center"><div class="bt-plabel bt-plabel-c">${q.cLabel}</div>${cOpts}<div class="bt-note">(Select 1)</div></div>
    <div class="bt-arrows"><div class="bt-arrow-l">▶</div><div style="font-size:.55rem;color:var(--lpu);font-weight:900;writing-mode:vertical-rl;text-align:center;letter-spacing:1px">THEN DO</div><div class="bt-arrow-r">▶</div></div>
    <div class="bt-panel"><div class="bt-plabel">${q.rLabel}</div>${rOpts}<div class="bt-note">(Select 2)</div></div>
  </div>`;
  return cardOpen('bowtie',q)+btBody+cardClose('submitBowtie()');
}

// ═══════════════════════════════════════════════════════
//  SUBMIT
// ═══════════════════════════════════════════════════════
function submitMC(){
  const q=SQ[ci];
  const sel=document.querySelector('input[name="qr"]:checked');
  if(!sel){alert('Please select an answer.');return;}
  const v=sel.value; const ok=q.ans.includes(v);
  if(ok) ep++;
  document.querySelectorAll('input[name="qr"]').forEach(i=>i.disabled=true);
  q.opts.forEach((o,i)=>{
    const lbl=document.querySelectorAll('.opt-lbl')[i]; lbl.classList.add('locked');
    if(q.ans.includes(o.l)){lbl.classList.add('iscorrect');lbl.querySelector('.opt-dot').textContent='✓';}
    if(o.l===v&&!q.ans.includes(o.l)){lbl.classList.add('iswrong');lbl.querySelector('.opt-dot').textContent='✗';}
  });
  showRat(ok?'ok':'er',q.rat); finish();
}
function submitSATA(){
  const q=SQ[ci];
  const sels=Array.from(document.querySelectorAll('input[name="qr"]:checked')).map(i=>i.value);
  if(!sels.length){alert('Please select at least one answer.');return;}
  const correct=q.ans;
  const full=sels.length===correct.length&&correct.every(c=>sels.includes(c));
  const partial=!full&&correct.some(c=>sels.includes(c));
  if(full) ep+=1; else if(partial) ep+=0.5;
  document.querySelectorAll('input[name="qr"]').forEach(i=>i.disabled=true);
  q.opts.forEach((o,i)=>{
    const lbl=document.querySelectorAll('.opt-lbl')[i]; lbl.classList.add('locked');
    const isC=correct.includes(o.l); const wasSel=sels.includes(o.l);
    if(isC&&wasSel){lbl.classList.add('iscorrect');lbl.querySelector('.opt-dot').textContent='✓';}
    else if(isC&&!wasSel){lbl.classList.add('ismissed');lbl.querySelector('.opt-dot').textContent='!';}
    else if(!isC&&wasSel){lbl.classList.add('iswrong');lbl.querySelector('.opt-dot').textContent='✗';}
  });
  showRat(full?'ok':partial?'pt':'er',q.rat,full,partial); finish();
}
function submitMatrix(){
  const q=SQ[ci]; let cc=0;
  q.rows.forEach((row,ri)=>{
    const sel=document.querySelector(`input[name="mr${ri}"]:checked`);
    const sv=sel?parseInt(sel.value):-1; const isOk=sv===row.ans;
    if(isOk) cc++;
    q.cols.forEach((_,ci2)=>{
      const td=document.getElementById(`mc_${ri}_${ci2}`);
      const inp=td.querySelector('.mrl-input'); inp.disabled=true;
      if(ci2===row.ans&&ci2===sv) td.classList.add('cell-ok');
      else if(ci2===sv&&ci2!==row.ans) td.classList.add('cell-er');
      else if(ci2===row.ans&&ci2!==sv) td.classList.add('cell-ms');
    });
  });
  ep+=cc/q.rows.length;
  const full=cc===q.rows.length; const partial=!full&&cc>0;
  showRat(full?'ok':partial?'pt':'er',q.rat,full,partial,cc,q.rows.length); finish();
}
function submitBowtie(){
  const q=SQ[ci];
  const lSels=Array.from(document.querySelectorAll('input[name="bt_l"]:checked')).map(i=>i.value);
  const cSel=document.querySelector('input[name="bt_c"]:checked');
  const rSels=Array.from(document.querySelectorAll('input[name="bt_r"]:checked')).map(i=>i.value);
  if(!lSels.length&&!cSel&&!rSels.length){alert('Please make at least one selection in each section.');return;}
  // Score
  const lFull=lSels.length===q.lAns.length&&q.lAns.every(a=>lSels.includes(a));
  const cOk=cSel&&cSel.value===q.cAns;
  const rFull=rSels.length===q.rAns.length&&q.rAns.every(a=>rSels.includes(a));
  let pts=0;
  if(lFull) pts+=1; else if(q.lAns.some(a=>lSels.includes(a))) pts+=0.5;
  if(cOk) pts+=1;
  if(rFull) pts+=1; else if(q.rAns.some(a=>rSels.includes(a))) pts+=0.5;
  ep+=pts;
  // Reveal left
  document.querySelectorAll('input[name="bt_l"]').forEach(i=>{i.disabled=true;});
  q.lOpts.forEach((o,i)=>{
    const lbl=document.querySelectorAll('.bt-opt-item.bt-chk .bt-lbl')[i];
    if(!lbl) return; lbl.classList.add('locked');
    const isC=q.lAns.includes(o.l); const wasSel=lSels.includes(o.l);
    if(isC&&wasSel){lbl.classList.add('iscorrect');lbl.querySelector('.bt-dot').textContent='✓';}
    else if(isC&&!wasSel){lbl.classList.add('ismissed');lbl.querySelector('.bt-dot').textContent='!';}
    else if(!isC&&wasSel){lbl.classList.add('iswrong');lbl.querySelector('.bt-dot').textContent='✗';}
  });
  // Reveal center
  document.querySelectorAll('input[name="bt_c"]').forEach(i=>i.disabled=true);
  q.cOpts.forEach((o,i)=>{
    const allLbls=Array.from(document.querySelectorAll('.bt-panel-center .bt-lbl'));
    const lbl=allLbls[i]; if(!lbl) return; lbl.classList.add('locked');
    if(o.l===q.cAns) lbl.classList.add('iscorrect');
    if(cSel&&cSel.value===o.l&&o.l!==q.cAns) lbl.classList.add('iswrong');
  });
  // Reveal right - select right panel bt-chk elements after left ones
  const allChkLbls=Array.from(document.querySelectorAll('.bt-opt-item.bt-chk .bt-lbl'));
  const rStartIdx=q.lOpts.length;
  q.rOpts.forEach((o,i)=>{
    const lbl=allChkLbls[rStartIdx+i]; if(!lbl) return; lbl.classList.add('locked');
    const isC=q.rAns.includes(o.l); const wasSel=rSels.includes(o.l);
    if(isC&&wasSel){lbl.classList.add('iscorrect');lbl.querySelector('.bt-dot').textContent='✓';}
    else if(isC&&!wasSel){lbl.classList.add('ismissed');lbl.querySelector('.bt-dot').textContent='!';}
    else if(!isC&&wasSel){lbl.classList.add('iswrong');lbl.querySelector('.bt-dot').textContent='✗';}
  });
  const totPoss=3; const pct=pts/totPoss;
  const type=pts>=2.5?'ok':pts>=1?'pt':'er';
  let rslt='';
  if(type==='ok') rslt=`<div class="rat-result ok">✦ Excellent! All 3 components correct (${pts.toFixed(1)}/3 pts)</div>`;
  else if(type==='pt') rslt=`<div class="rat-result pt">◑ Partially Correct (${pts.toFixed(1)}/3 pts)</div>`;
  else rslt=`<div class="rat-result er">✗ Incorrect — Review All Three Sections</div>`;
  const box=document.getElementById('ratBox');
  box.innerHTML=`<div class="rat-head">📖 Rationale</div>${rslt}<div class="rat-text">${q.rat}</div>`;
  box.style.display='block'; box.scrollIntoView({behavior:'smooth',block:'nearest'});
  finish();
}
function showRat(type,text,full,partial,cc,tot){
  const box=document.getElementById('ratBox');
  let res='';
  if(type==='ok') res=`<div class="rat-result ok">✦ Correct!</div>`;
  else if(type==='pt'){const lbl=tot?` (${cc}/${tot} correct)`:' — partially correct';res=`<div class="rat-result pt">◑ Partially Correct${lbl}</div>`;}
  else res=`<div class="rat-result er">✗ Incorrect — Review Rationale</div>`;
  box.innerHTML=`<div class="rat-head">📖 Rationale</div>${res}<div class="rat-text">${text}</div>`;
  box.style.display='block'; box.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function finish(){
  document.getElementById('subBtn').style.display='none';
  document.getElementById('nxtBtn').style.display='block';
  document.getElementById('scoreTxt').textContent=`Score: ${ep.toFixed(1)} / ${maxPts}`;
}
function nextQ(){
  ci++;
  if(ci>=SQ.length) showScore();
  else{render(); window.scrollTo({top:0,behavior:'smooth'});}
}

// ═══════════════════════════════════════════════════════
//  SCORE SCREEN
// ═══════════════════════════════════════════════════════
function showScore(){
  document.getElementById('progSection').style.display='none';
  document.getElementById('qArea').style.display='none';
  const scr=document.getElementById('scoreScr'); scr.style.display='block';
  const pct=Math.round((ep/maxPts)*100);
  document.getElementById('sPct').textContent=pct+'%';
  let msg='',sub='';
  if(pct>=90){msg='🌟 Outstanding!';sub='You absolutely crushed this exam, Sophia! Clinical queen behavior fr fr ✨';}
  else if(pct>=80){msg='✨ Great Work!';sub='Really strong performance! Review your missed rationales and you\'re golden.';}
  else if(pct>=70){msg='💪 Good Effort!';sub='You\'re getting there! Focus on those tricky distractors and retake for a higher score.';}
  else{msg='📚 Keep Studying!';sub='Review drug cards and rationales carefully, then try again — you\'ve got this!';}
  document.getElementById('sMsg').textContent=msg;
  document.getElementById('sSub').innerHTML=sub+`<br><small style="color:var(--lpu);display:block;margin-top:4px">Raw score: ${ep.toFixed(1)} / ${maxPts} pts</small>`;
  document.getElementById('sTiles').innerHTML=`
    <div class="s-tile"><div class="tn">${pct}%</div><div class="tl">Overall</div></div>
    <div class="s-tile"><div class="tn">${ep.toFixed(1)}</div><div class="tl">Points Earned</div></div>
    <div class="s-tile"><div class="tn">${maxPts}</div><div class="tl">Points Possible</div></div>
    <div class="s-tile"><div class="tn">60</div><div class="tl">Questions</div></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function restart(){init(); window.scrollTo({top:0,behavior:'smooth'});}
window.onload=init;
</script>
